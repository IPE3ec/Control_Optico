<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración - Control Óptico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f4f8; }
    .card-hover:hover { transform: translateY(-2px); transition: all 0.2s; }
  </style>
</head>
<body class="p-6">
  <div class="max-w-7xl mx-auto">
    <!-- Cabecera -->
    <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-md">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-3xl text-blue-700">admin_panel_settings</span>
        <h1 class="text-2xl font-bold text-gray-800">Panel de Control Maestro</h1>
      </div>
      <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl flex items-center gap-2 transition">
        <span class="material-symbols-outlined">logout</span> Cerrar sesión
      </button>
    </div>

    <!-- Estado global del sistema -->
    <div class="bg-white rounded-2xl shadow-md p-5 mb-6">
      <h2 class="font-bold text-xl mb-3 flex items-center gap-2"><span class="material-symbols-outlined text-blue-600">toggle_on</span> Control global de acceso</h2>
      <div class="flex flex-wrap gap-4 items-center">
        <span class="text-gray-600">Estado actual:</span>
        <span id="globalStatusBadge" class="px-4 py-1.5 rounded-full text-sm font-bold">--</span>
        <button id="btnActivarGlobal" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition">Activar sistema</button>
        <button id="btnBloquearGlobal" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition">Bloquear sistema</button>
      </div>
    </div>

    <!-- Solicitudes pendientes de planes -->
    <div class="bg-white rounded-2xl shadow-md p-5 mb-6">
      <h2 class="font-bold text-xl mb-3 flex items-center gap-2"><span class="material-symbols-outlined text-amber-500">pending_actions</span> Solicitudes de planes pendientes</h2>
      <div id="pendingRequestsList" class="space-y-3">Cargando...</div>
    </div>

    <!-- Usuarios con plan activo -->
    <div class="bg-white rounded-2xl shadow-md p-5 mb-6">
      <h2 class="font-bold text-xl mb-3 flex items-center gap-2"><span class="material-symbols-outlined text-green-600">verified_user</span> Usuarios con plan activo</h2>
      <div id="activeUsersList" class="overflow-x-auto">Cargando...</div>
    </div>

    <!-- Sucursales (Sedes) -->
    <div class="bg-white rounded-2xl shadow-md p-5">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-bold text-xl flex items-center gap-2"><span class="material-symbols-outlined text-blue-600">storefront</span> Sucursales registradas</h2>
        <button id="newSedeBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-1 transition">
          <span class="material-symbols-outlined text-base">add</span> Nueva sede
        </button>
      </div>
      <div id="sedesTable" class="overflow-x-auto">Cargando...</div>
    </div>
  </div>

  <script>
    // === CONFIGURACIÓN ===
    const API_URL = 'https://script.google.com/macros/s/AKfycbyegoMXgGxVcwKDfVYZ8TNm3s8dwh3c1-YJelDQv8wfadPAdcvhjNn4rR-oYzgmymbOYg/exec'; // <-- REEMPLAZA

    // Autenticación: si no hay sesión de admin, la pedimos con prompt
    if (!sessionStorage.getItem('adminLogged')) {
      const user = prompt("Acceso restringido. Ingrese su correo de administrador:");
      const pass = prompt("Contraseña:");
      if (user && pass) {
        fetch(`${API_URL}?action=adminLogin&correo=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`)
          .then(r => r.json())
          .then(data => {
            if (data.success) {
              sessionStorage.setItem('adminLogged', 'true');
              location.reload();
            } else {
              alert("Credenciales incorrectas. Volviendo al inicio.");
              window.location.href = 'login.html';
            }
          })
          .catch(() => { alert("Error de conexión"); window.location.href = 'login.html'; });
      } else {
        window.location.href = 'login.html';
      }
      throw new Error("Esperando autenticación");
    }

    // === FUNCIONES API ===
    async function apiRequest(action, params = {}) {
      const query = new URLSearchParams({ action, ...params }).toString();
      const res = await fetch(`${API_URL}?${query}`, { method: 'GET', mode: 'cors' });
      if (!res.ok) throw new Error('Error de red');
      return await res.json();
    }

    // === CARGAR SOLICITUDES PENDIENTES ===
    async function loadPending() {
      const container = document.getElementById('pendingRequestsList');
      try {
        const res = await apiRequest('getPendingRequests');
        if (!res.success || res.pendientes.length === 0) {
          container.innerHTML = '<p class="text-gray-500 text-center py-4">No hay solicitudes pendientes.</p>';
          return;
        }
        container.innerHTML = res.pendientes.map(p => `
          <div class="border rounded-xl p-4 flex flex-wrap justify-between items-center gap-3 bg-gray-50">
            <div>
              <strong class="text-gray-800">${escapeHtml(p.nombre)}</strong><br>
              <span class="text-sm text-gray-500">${p.correo}</span><br>
              <span class="text-xs bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full">Plan: ${p.plan} - $${p.monto}</span>
            </div>
            <div class="flex gap-2">
              <button class="approve-btn bg-green-600 hover:bg-green-700 text-white px-4 py-1.5 rounded-lg text-sm" data-correo="${p.correo}" data-accion="aprobar">✓ Aprobar</button>
              <button class="reject-btn bg-red-600 hover:bg-red-700 text-white px-4 py-1.5 rounded-lg text-sm" data-correo="${p.correo}" data-accion="rechazar">✗ Rechazar</button>
            </div>
          </div>
        `).join('');
        // Eventos para aprobar/rechazar
        document.querySelectorAll('.approve-btn, .reject-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const correo = btn.dataset.correo;
            const accion = btn.classList.contains('approve-btn') ? 'aprobar' : 'rechazar';
            const result = await apiRequest('approvePlan', { correo, accion });
            alert(result.mensaje || (result.success ? 'Operación exitosa' : 'Error'));
            loadPending();
            loadActiveUsers();
          });
        });
      } catch (err) {
        container.innerHTML = '<p class="text-red-500">Error al cargar solicitudes</p>';
        console.error(err);
      }
    }

    // === CARGAR USUARIOS ACTIVOS ===
    async function loadActiveUsers() {
      const container = document.getElementById('activeUsersList');
      try {
        const res = await apiRequest('getUsersList');
        const active = res.users.filter(u => u.estado === 'activo');
        if (active.length === 0) {
          container.innerHTML = '<p class="text-gray-500 text-center py-4">No hay usuarios con plan activo.</p>';
          return;
        }
        container.innerHTML = `
          <table class="min-w-full border-collapse">
            <thead class="bg-gray-100">
              <tr><th class="p-2 text-left">Nombre</th><th class="p-2 text-left">Plan</th><th class="p-2 text-left">Vence el</th><th class="p-2 text-left">Estado</th></tr>
            </thead>
            <tbody>
              ${active.map(u => `
                <tr class="border-t">
                  <td class="p-2">${escapeHtml(u.nombre)}</td>
                  <td class="p-2">${u.plan}</td>
                  <td class="p-2">${new Date(u.fecha_fin).toLocaleDateString()}</td>
                  <td class="p-2"><span class="bg-green-100 text-green-800 px-2 py-0.5 rounded-full text-xs">Activo</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (err) { console.error(err); }
    }

    // === CARGAR SEDES ===
    async function loadSedes() {
      const container = document.getElementById('sedesTable');
      try {
        const res = await apiRequest('getSedes');
        if (!res.success || res.sedes.length === 0) {
          container.innerHTML = '<p class="text-gray-500 text-center py-4">No hay sedes registradas.</p>';
          return;
        }
        container.innerHTML = `
          <table class="min-w-full border-collapse">
            <thead class="bg-gray-100">
              <tr><th class="p-2 text-left">Nombre</th><th class="p-2 text-left">Administrador</th><th class="p-2 text-left">Dirección</th><th class="p-2 text-left">Acceso</th><th class="p-2 text-left">Acciones</th></tr>
            </thead>
            <tbody>
              ${res.sedes.map(s => `
                <tr class="border-t">
                  <td class="p-2">${escapeHtml(s.nombre)}</td>
                  <td class="p-2">${escapeHtml(s.administrador)}</td>
                  <td class="p-2">${escapeHtml(s.direccion)}</td>
                  <td class="p-2">
                    <button class="toggle-access px-3 py-1 rounded-lg text-sm ${s.acceso === 'autorizado' ? 'bg-green-500 text-white' : 'bg-gray-400 text-white'}" data-id="${s.id}" data-acceso="${s.acceso}">
                      ${s.acceso === 'autorizado' ? 'Autorizado' : 'Pendiente'}
                    </button>
                  </td>
                  <td class="p-2">
                    <button class="key-btn text-blue-600 hover:underline" data-id="${s.id}" data-nombre="${s.nombre}">🔑 Llave</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
        // Eventos dinámicos para botones de acceso y llave
        document.querySelectorAll('.toggle-access').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.dataset.id;
            const nuevo = btn.dataset.acceso === 'autorizado' ? 'pendiente' : 'autorizado';
            await apiRequest('updateSedeAccess', { id, acceso: nuevo });
            loadSedes();
          });
        });
        document.querySelectorAll('.key-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            alert(`🔑 Llave de acceso para ${btn.dataset.nombre}\nID: ${btn.dataset.id}\nToken: GM-${btn.dataset.id}-${Math.random().toString(36).substr(2,8).toUpperCase()}`);
          });
        });
      } catch (err) { console.error(err); }
    }

    // === ESTADO GLOBAL ===
    async function loadGlobalStatus() {
      try {
        const res = await apiRequest('getSystemStatus');
        const badge = document.getElementById('globalStatusBadge');
        badge.innerText = res.activo ? 'ACTIVO' : 'BLOQUEADO';
        badge.className = `px-4 py-1.5 rounded-full text-sm font-bold ${res.activo ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
      } catch (err) { console.error(err); }
    }
    async function setGlobalStatus(status) {
      await apiRequest('setSystemStatus', { status });
      loadGlobalStatus();
    }

    // === CREAR SEDE ===
    async function nuevaSede() {
      const nombre = prompt("Nombre de la nueva sede:");
      if (!nombre) return;
      const admin = prompt("Nombre del administrador:");
      if (!admin) return;
      const direccion = prompt("Dirección:");
      const telefono = prompt("Teléfono:");
      await apiRequest('createSede', { nombre, administrador: admin, direccion, telefono });
      loadSedes();
    }

    function escapeHtml(str) { return String(str || '').replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

    // Eventos
    document.getElementById('btnActivarGlobal').onclick = () => setGlobalStatus('ACTIVO');
    document.getElementById('btnBloquearGlobal').onclick = () => setGlobalStatus('BLOQUEADO');
    document.getElementById('newSedeBtn').onclick = nuevaSede;
    document.getElementById('logoutBtn').onclick = () => {
      sessionStorage.removeItem('adminLogged');
      window.location.href = 'login.html';
    };

    loadPending();
    loadActiveUsers();
    loadSedes();
    loadGlobalStatus();
  </script>
</body>
</html>
