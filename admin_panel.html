<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Óptico - Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #f8fafc 0%, #e0e7ff 100%); }
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 antialiased">

  <div class="max-w-md w-full bg-white rounded-3xl shadow-[0_20px_50px_rgba(0,63,135,0.08)] overflow-hidden border border-gray-100/80">
    <!-- Cabecera -->
    <div class="bg-gradient-to-br from-[#002d5e] via-[#003f87] to-[#0056b3] px-8 py-7 text-white relative overflow-hidden">
      <div class="absolute -right-10 -top-10 w-32 h-32 bg-white/5 rounded-full blur-xl"></div>
      <div class="flex items-center gap-3.5 relative z-10">
        <div class="bg-white/10 p-2 rounded-2xl backdrop-blur-md border border-white/10">
          <span class="material-symbols-outlined text-3xl text-blue-200">visibility</span>
        </div>
        <div>
          <span class="font-extrabold text-2xl tracking-tight bg-gradient-to-r from-white to-blue-100 bg-clip-text text-transparent">Control Óptico</span>
          <p class="text-xs text-blue-200/90 font-medium mt-0.5">Gestión profesional para ópticas</p>
        </div>
      </div>
      <p class="text-xs text-blue-100/80 mt-4 bg-black/10 px-3 py-1.5 rounded-lg inline-block border border-white/5">
        Accede o regístrate para administrar tu óptica
      </p>
    </div>

    <div id="appContent" class="p-8"></div>
  </div>

  <script>
    // === CONFIGURACIÓN ===
    const API_URL = 'https://script.google.com/macros/s/AKfycbyegoMXgGxVcwKDfVYZ8TNm3s8dwh3c1-YJelDQv8wfadPAdcvhjNn4rR-oYzgmymbOYg/exec';  // <-- REEMPLAZA
    const SOPORTE_WHATSAPP = '593984016027'; 

    let currentView = 'login';
    let currentUserEmail = null;
    let currentUserName = '';

    async function apiRequest(action, params = {}, disableButton = null) {
      if (disableButton) {
        disableButton.disabled = true;
        disableButton.classList.add('opacity-60', 'cursor-not-allowed');
      }
      try {
        const query = new URLSearchParams({ action, ...params }).toString();
        const url = `${API_URL}?${query}`;
        const response = await fetch(url, { method: 'GET', mode: 'cors' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (err) {
        throw new Error('No se pudo conectar con el servidor.');
      } finally {
        if (disableButton) {
          disableButton.disabled = false;
          disableButton.classList.remove('opacity-60', 'cursor-not-allowed');
        }
      }
    }

    // ========== VISTAS ==========
    function renderLogin() {
      return `
        <div class="animate-fade-in">
          <h2 class="text-2xl font-bold text-gray-800">🔐 Iniciar sesión</h2>
          <p class="text-gray-400 text-sm mt-1 mb-6">Ingresa tu correo y contraseña</p>
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Correo electrónico</label>
              <input type="email" id="loginEmail" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none" placeholder="ejemplo@opticagm.com">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Contraseña</label>
              <input type="password" id="loginPassword" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none" placeholder="••••••••">
            </div>
            <button id="doLoginBtn" class="w-full bg-[#003f87] hover:bg-[#002d5e] text-white py-3 rounded-xl font-semibold shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2">
              <span class="material-symbols-outlined text-lg">login</span> Ingresar
            </button>
            <div class="border-t border-gray-100 my-6 pt-4 text-center">
              <p class="text-sm text-gray-500">¿No tienes cuenta? <button id="goToRegister" class="text-[#003f87] font-bold hover:underline ml-1">Regístrate aquí</button></p>
            </div>
          </div>
        </div>
      `;
    }

    function renderRegister() {
      return `
        <div class="animate-fade-in">
          <h2 class="text-2xl font-bold text-gray-800">📝 Registro de óptica</h2>
          <p class="text-gray-400 text-sm mt-1 mb-4">Completa los datos de tu negocio</p>
          <div class="space-y-3.5 max-h-[420px] overflow-y-auto pr-1 custom-scroll">
            <div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Nombre de la Óptica</label><input id="regOptica" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none" placeholder="Ej: Ópticas GM Centro"></div>
            <div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Nombre del Doctor</label><input id="regDoctor" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none" placeholder="Ej: Dr. Alejandro Gómez"></div>
            <div class="grid grid-cols-2 gap-3">
              <div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Ciudad</label><input id="regCiudad" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm" placeholder="Quito"></div>
              <div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">RUC / ID</label><input id="regRuc" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm" placeholder="1790012345001"></div>
            </div>
            <div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Dirección</label><input id="regDireccion" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm" placeholder="Av. Amazonas y NNUU"></div>
            <div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Teléfono / WhatsApp</label><input id="regTelefono" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm" placeholder="0999123456"></div>
            <div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Correo electrónico</label><input type="email" id="regCorreo" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm" placeholder="contacto@opticagm.com"></div>
            <div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Contraseña</label><input type="password" id="regPassword" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm" placeholder="Mínimo 6 caracteres"></div>
          </div>
          <div class="mt-5 space-y-4">
            <button id="doRegisterBtn" class="w-full bg-[#003f87] hover:bg-[#002d5e] text-white py-3 rounded-xl font-semibold shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
              <span class="material-symbols-outlined text-lg">how_to_reg</span> Finalizar Registro
            </button>
            <p class="text-center text-sm text-gray-500">¿Ya tienes cuenta? <button id="goToLogin" class="text-[#003f87] font-bold hover:underline ml-1">Inicia sesión</button></p>
          </div>
        </div>
      `;
    }

    function renderPlans() {
      return `
        <div class="animate-fade-in">
          <h2 class="text-2xl font-bold text-gray-800">💎 Elige tu plan</h2>
          <p class="text-sm text-gray-400 mt-1 mb-5">Selecciona la suscripción</p>
          <div id="planContainer" class="space-y-3">
            <div class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center hover:bg-blue-50/30 hover:border-blue-200 cursor-pointer transition-all group" data-plan="gratis">
              <div class="flex items-center gap-3"><span class="material-symbols-outlined text-gray-400 group-hover:text-blue-600">auto_awesome</span><div><span class="font-bold text-gray-800">Plan Gratis</span><span class="text-xs text-gray-400 block">7 días de prueba</span></div></div>
              <span class="text-emerald-600 font-extrabold text-xl bg-emerald-50 px-3 py-1 rounded-xl">Gratis</span>
            </div>
            <div class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center hover:bg-blue-50/30 hover:border-blue-200 cursor-pointer transition-all group" data-plan="mensual">
              <div class="flex items-center gap-3"><span class="material-symbols-outlined text-gray-400 group-hover:text-blue-600">calendar_month</span><div><span class="font-bold text-gray-800">Plan Mensual</span><span class="text-xs text-gray-400 block">30 días</span></div></div>
              <span class="text-[#003f87] font-extrabold text-xl bg-blue-50 px-3 py-1 rounded-xl">$20</span>
            </div>
            <div class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center hover:bg-blue-50/30 hover:border-blue-200 cursor-pointer transition-all group" data-plan="semestral">
              <div class="flex items-center gap-3"><span class="material-symbols-outlined text-gray-400 group-hover:text-blue-600">package_2</span><div><span class="font-bold text-gray-800">Plan Semestral</span><span class="text-xs text-blue-600 font-medium bg-blue-50 px-2 py-0.5 rounded-md inline-block">Ahorra $10</span></div></div>
              <span class="text-[#003f87] font-extrabold text-xl bg-blue-50 px-3 py-1 rounded-xl">$110</span>
            </div>
            <div class="border-2 border-blue-500/30 bg-blue-50/10 rounded-2xl p-4 flex justify-between items-center hover:bg-blue-50/30 hover:border-blue-400 cursor-pointer transition-all group relative" data-plan="anual">
              <div class="absolute -top-2.5 right-4 bg-gradient-to-r from-amber-500 to-orange-500 text-white text-[10px] font-extrabold px-2.5 py-0.5 rounded-full uppercase shadow-sm animate-pulse">Mejor Valor</div>
              <div class="flex items-center gap-3"><span class="material-symbols-outlined text-blue-600">verified</span><div><span class="font-bold text-gray-800">Plan Anual</span><span class="text-xs text-emerald-600 font-medium bg-emerald-50 px-2 py-0.5 rounded-md inline-block">Ahorra $40 🔥</span></div></div>
              <span class="text-[#003f87] font-extrabold text-xl bg-blue-50 px-3 py-1 rounded-xl">$200</span>
            </div>
          </div>
          <div id="mensajePlan" class="mt-5 p-4 rounded-xl text-center text-sm font-medium hidden bg-gray-50 border border-gray-100"></div>
          <div class="mt-6 text-center text-xs text-gray-400 bg-gray-50/80 border p-3 rounded-xl flex items-center justify-center gap-2"><span class="material-symbols-outlined text-sm">lock</span> Pago seguro por transferencia o enlace de pago.</div>
        </div>
      `;
    }

    // ========== EVENTOS ==========
    function attachEvents() {
      if (currentView === 'login') {
        const loginBtn = document.getElementById('doLoginBtn');
        loginBtn?.addEventListener('click', async () => {
          const correo = document.getElementById('loginEmail').value.trim();
          const password = document.getElementById('loginPassword').value;
          if (!correo || !password) { alert('❌ Ingresa correo y contraseña'); return; }
          loginBtn.disabled = true;
          loginBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Verificando...`;
          try {
            const result = await apiRequest('login', { correo, password });
            if (result.success) {
              if (result.rol === 'admin') {
                window.location.href = 'admin_panel.html';
              } else {
                // Cliente: si tiene plan activo, va a dashboard, si no, a selección de planes
                if (result.tienePlanActivo) {
                  window.location.href = 'dashboard.html?email=' + encodeURIComponent(correo);
                } else {
                  currentUserEmail = correo;
                  currentUserName = result.doctor || result.nombre || 'Especialista';
                  currentView = 'plans';
                  renderApp();
                }
              }
            } else {
              alert('⚠️ ' + (result.error || 'Credenciales incorrectas'));
            }
          } catch (err) { alert('🚫 Error: ' + err.message); }
          finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = `<span class="material-symbols-outlined text-lg">login</span> Ingresar`;
          }
        });
        document.getElementById('goToRegister')?.addEventListener('click', () => { currentView = 'register'; renderApp(); });
      }
      else if (currentView === 'register') {
        const regBtn = document.getElementById('doRegisterBtn');
        regBtn?.addEventListener('click', async () => {
          const nombre = document.getElementById('regOptica').value.trim();
          const doctor = document.getElementById('regDoctor').value.trim();
          const ciudad = document.getElementById('regCiudad').value.trim();
          const ruc = document.getElementById('regRuc').value.trim();
          const direccion = document.getElementById('regDireccion').value.trim();
          const telefono = document.getElementById('regTelefono').value.trim();
          const correo = document.getElementById('regCorreo').value.trim();
          const password = document.getElementById('regPassword').value;
          if (!nombre || !doctor || !ciudad || !correo || !password) {
            alert('❌ Completa los campos obligatorios'); return;
          }
          regBtn.disabled = true;
          regBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Registrando...`;
          try {
            const result = await apiRequest('register', { nombre, doctor, ciudad, ruc, direccion, telefono, correo, password });
            if (result.success) {
              currentUserEmail = correo;
              currentUserName = doctor;
              currentView = 'plans';
              renderApp();
            } else {
              alert('❌ Error: ' + (result.error || 'No se pudo registrar'));
            }
          } catch (err) { alert('🚫 Error de conexión: ' + err.message); }
          finally {
            regBtn.disabled = false;
            regBtn.innerHTML = `<span class="material-symbols-outlined text-lg">how_to_reg</span> Finalizar Registro`;
          }
        });
        document.getElementById('goToLogin')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
      }
      else if (currentView === 'plans') {
        const planCards = document.querySelectorAll('[data-plan]');
        const mensajeDiv = document.getElementById('mensajePlan');
        let yaEnviado = false;
        planCards.forEach(card => {
          card.addEventListener('click', async () => {
            if (yaEnviado) { alert('Ya enviaste tu solicitud. Espera la aprobación del administrador.'); return; }
            const plan = card.getAttribute('data-plan');
            let monto = 0, duracionDias = 0;
            switch(plan) {
              case 'gratis': monto = 0; duracionDias = 7; break;
              case 'mensual': monto = 20; duracionDias = 30; break;
              case 'semestral': monto = 110; duracionDias = 180; break;
              case 'anual': monto = 200; duracionDias = 365; break;
            }
            if (!currentUserEmail) { alert('Error: usuario no identificado'); return; }
            planCards.forEach(c => { c.style.pointerEvents = 'none'; c.classList.add('opacity-40'); });
            card.classList.remove('opacity-40');
            card.classList.add('border-blue-600', 'bg-blue-50/40');
            mensajeDiv.classList.remove('hidden');
            mensajeDiv.innerHTML = '<span class="text-blue-600 flex items-center justify-center gap-2"><span class="material-symbols-outlined animate-spin">progress_activity</span> Procesando solicitud...</span>';
            try {
              const result = await apiRequest('savePlan', { correo: currentUserEmail, plan, monto, duracionDias });
              if (result.success) {
                yaEnviado = true;
                mensajeDiv.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-700');
                mensajeDiv.innerHTML = '<span class="flex items-center justify-center gap-2"><span class="material-symbols-outlined">check_circle</span> ¡Solicitud enviada! Abriendo WhatsApp de soporte...</span>';
                const textMsg = `¡Hola Soporte! 👋\nHe completado mi registro y elegido plan.\n👤 Doctor: ${currentUserName}\n📧 Correo: ${currentUserEmail}\n💎 Plan: ${plan.toUpperCase()} ($${monto})\nQuedo atento a la activación.`;
                const whatsappUrl = `https://wa.me/${SOPORTE_WHATSAPP}?text=${encodeURIComponent(textMsg)}`;
                setTimeout(() => window.open(whatsappUrl, '_blank'), 1000);
              } else {
                alert('⚠️ Error: ' + (result.error || 'No se pudo guardar el plan'));
                planCards.forEach(c => { c.style.pointerEvents = 'auto'; c.classList.remove('opacity-40', 'border-blue-600', 'bg-blue-50/40'); });
                mensajeDiv.classList.add('hidden');
              }
            } catch (err) {
              alert('🚫 Error: ' + err.message);
              planCards.forEach(c => { c.style.pointerEvents = 'auto'; c.classList.remove('opacity-40', 'border-blue-600', 'bg-blue-50/40'); });
              mensajeDiv.classList.add('hidden');
            }
          });
        });
      }
    }

    function renderApp() {
      let html = '';
      if (currentView === 'login') html = renderLogin();
      else if (currentView === 'register') html = renderRegister();
      else if (currentView === 'plans') html = renderPlans();
      document.getElementById('appContent').innerHTML = html;
      attachEvents();
    }
    renderApp();
  </script>
</body>
</html>
