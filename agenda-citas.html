<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Agenda - Control Óptico</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  
  <!-- Material Symbols (asegura la carga correcta) -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
  
  <!-- Estilos base (incluye variables CSS) -->
  <link rel="stylesheet" href="style.css"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#7B2FBE",
            secondary: "#2E7D32",
            tertiary: "#0288D1",
            neutral: "#424242",
            "primary-container": "#F3E5F5",
            "on-primary-container": "#4A148C",
            "secondary-container": "#E8F5E9",
            "on-secondary-container": "#1B5E20",
            "surface": "#f7f9ff",
            "surface-container-lowest": "#ffffff",
            "outline-variant": "#c2c6d4",
            "on-surface": "#181c20",
            "on-surface-variant": "#424752",
            "background": "#f7f9ff",
            "error": "#ba1a1a",
            "error-container": "#ffdad6",
          },
          borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
          fontFamily: { sans: ["Inter", "sans-serif"] },
        },
      },
    }
  </script>
  
  <style>
    /* Asegura que los iconos se muestren correctamente */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      vertical-align: middle;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body {
      min-height: max(884px, 100dvh);
      background: #f7f9ff;
    }
    /* Transiciones suaves */
    .transition-all { transition: all 0.2s ease; }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen pb-24 md:pb-0 md:pl-80">

  <!-- ===== HEADER ===== -->
  <header class="bg-surface w-full top-0 sticky border-b border-outline-variant shadow-sm flex justify-between items-center px-4 md:px-8 h-16 z-40">
    <div class="flex items-center gap-3">
      <img id="logoImg" src="" alt="Logo" style="display:none; max-height:40px;">
      <span id="brandName" class="font-headline-md text-headline-md font-bold text-primary">Ópticas GM</span>
    </div>
    <div class="flex items-center gap-4">
      <button id="bellBtn" class="material-symbols-outlined text-on-surface-variant p-2 rounded-full hover:bg-surface-container-low transition-colors relative">
        notifications
        <span id="badgeCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
      </button>
      <button id="gearBtn" class="material-symbols-outlined text-on-surface-variant p-2 rounded-full hover:bg-surface-container-low transition-colors">settings</button>
      <div class="h-10 w-10 rounded-full overflow-hidden border border-outline-variant bg-surface-container-high">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUJglcOY7JOO6_XaivicYtlsakrxzrFcjoTq5zZoQEzL-ZDlDylbe6Sd8ZXnSaU1MDWTQ0zROuDic9-fHSB7olnkFwMZXQu_6y7SXqJVEetoTltUxp8AiNpocoXoDZo23NQFwJhJcOm1qcysfGHPH_FR5-M2-GD72Ou-MszuCwHaSfXUuioYudm1zkJ14x6dv5booQj5-W7SN3XcWENf5NwiO1FVZboikTahgUeCJ2_je7rrkIKbCkCYs-HkNJUdQsITjl_HDOge0" alt="Avatar" class="w-full h-full object-cover">
      </div>
    </div>
  </header>

  <!-- ===== SIDEBAR (Desktop) ===== -->
  <aside class="hidden md:flex flex-col py-6 h-full w-80 fixed left-0 top-0 bg-surface border-r border-outline-variant shadow-md z-50">
    <div class="px-6 mb-8 flex items-center gap-4">
      <div class="w-12 h-12 rounded-full bg-primary-container text-primary flex items-center justify-center">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">visibility</span>
      </div>
      <div>
        <p id="sidebarName" class="font-headline-md text-body-md font-bold text-primary">Dr. Practitioner</p>
        <p id="sidebarRole" class="text-on-surface-variant text-label-sm">Admin</p>
      </div>
    </div>
    <nav class="flex-1 space-y-1">
      <a href="dashboard.html?cliente=default" class="flex items-center px-4 py-3 text-on-surface-variant hover:bg-surface-container transition-colors duration-200 font-body-md text-body-md"><span class="material-symbols-outlined mr-4">dashboard</span>Dashboard</a>
      <a href="gestion_paciente.html?cliente=default" class="flex items-center px-4 py-3 text-on-surface-variant hover:bg-surface-container transition-colors duration-200 font-body-md text-body-md"><span class="material-symbols-outlined mr-4">groups</span>Pacientes</a>
      <a href="historia_clinica.html?cliente=default" class="flex items-center px-4 py-3 text-on-surface-variant hover:bg-surface-container transition-colors duration-200 font-body-md text-body-md"><span class="material-symbols-outlined mr-4">description</span>Historias</a>
      <a href="agenda-citas.html?cliente=default" class="flex items-center bg-primary-container text-primary font-bold rounded-r-full mr-4 px-4 py-3 transition-colors duration-200 font-body-md text-body-md"><span class="material-symbols-outlined mr-4" style="font-variation-settings: 'FILL' 1;">event</span>Agenda</a>
      <a href="config.html?cliente=default" class="flex items-center px-4 py-3 text-on-surface-variant hover:bg-surface-container transition-colors duration-200 font-body-md text-body-md"><span class="material-symbols-outlined mr-4">settings</span>Configuración</a>
    </nav>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="p-4 md:p-8 max-w-6xl mx-auto">
    <!-- Encabezado -->
    <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <h2 class="text-2xl md:text-3xl font-bold text-on-surface flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">calendar_month</span> Agenda de Citas
        </h2>
        <p class="text-on-surface-variant text-sm md:text-base">Gestiona las citas de tus pacientes.</p>
      </div>
      <button id="newAppointmentBtn" class="bg-primary text-white px-5 py-2 rounded-xl font-semibold flex items-center gap-2 shadow-md hover:opacity-90 active:scale-95 transition-all">
        <span class="material-symbols-outlined">add</span> Nueva Cita
      </button>
    </div>

    <!-- Filtros rápidos -->
    <div class="flex gap-2 overflow-x-auto hide-scrollbar mb-6 pb-2">
      <button class="filter-btn px-4 py-1.5 bg-primary text-white rounded-full text-sm font-medium" data-filter="all">Todas</button>
      <button class="filter-btn px-4 py-1.5 bg-surface border border-outline-variant text-on-surface-variant rounded-full text-sm font-medium hover:bg-surface-container-low transition-colors" data-filter="pendiente">Pendientes</button>
      <button class="filter-btn px-4 py-1.5 bg-surface border border-outline-variant text-on-surface-variant rounded-full text-sm font-medium hover:bg-surface-container-low transition-colors" data-filter="confirmada">Confirmadas</button>
      <button class="filter-btn px-4 py-1.5 bg-surface border border-outline-variant text-on-surface-variant rounded-full text-sm font-medium hover:bg-surface-container-low transition-colors" data-filter="cancelada">Canceladas</button>
      <button class="filter-btn px-4 py-1.5 bg-surface border border-outline-variant text-on-surface-variant rounded-full text-sm font-medium hover:bg-surface-container-low transition-colors" data-filter="asistió">Asistió</button>
    </div>

    <!-- Lista de citas (se llena dinámicamente) -->
    <div id="appointmentsList" class="space-y-4">
      <!-- Aquí se renderizarán las citas con JavaScript -->
      <div class="text-center text-on-surface-variant py-10">Cargando citas...</div>
    </div>
  </main>

  <!-- ===== FOOTER (Mobile) ===== -->
  <nav class="md:hidden fixed bottom-0 w-full z-50 bg-surface border-t border-outline-variant shadow-lg flex justify-around items-center h-20 pb-safe px-2">
    <a href="dashboard.html?cliente=default" class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container px-4 py-1 rounded-full transition-all active:scale-90"><span class="material-symbols-outlined text-2xl">home</span><span class="text-[11px] mt-1">Inicio</span></a>
    <a href="gestion_paciente.html?cliente=default" class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container px-4 py-1 rounded-full transition-all active:scale-90"><span class="material-symbols-outlined text-2xl">person</span><span class="text-[11px] mt-1">Pacientes</span></a>
    <a href="agenda-citas.html?cliente=default" class="flex flex-col items-center justify-center bg-primary-container text-primary rounded-full px-6 py-1 transition-all active:scale-90"><span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">event</span><span class="text-[11px] mt-1">Agenda</span></a>
    <a href="historia_clinica.html?cliente=default" class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container px-4 py-1 rounded-full transition-all active:scale-90"><span class="material-symbols-outlined text-2xl">description</span><span class="text-[11px] mt-1">Historias</span></a>
  </nav>

  <!-- ===== MODAL para nueva cita / edición ===== -->
  <div id="appointmentModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-on-surface" id="modalTitle">Nueva Cita</h3>
        <button id="closeModal" class="text-on-surface-variant hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <form id="appointmentForm">
        <input type="hidden" id="editId" value="">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-on-surface-variant mb-1">Paciente (ID o nombre)</label>
            <input type="text" id="pacienteInput" class="w-full border border-outline-variant rounded-xl px-4 py-2.5 bg-background focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="Nombre o ID del paciente" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-on-surface-variant mb-1">Especialista</label>
            <input type="text" id="especialistaInput" class="w-full border border-outline-variant rounded-xl px-4 py-2.5 bg-background focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="Dr. Nombre" required>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-on-surface-variant mb-1">Fecha</label>
              <input type="date" id="fechaInput" class="w-full border border-outline-variant rounded-xl px-4 py-2.5 bg-background focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" required>
            </div>
            <div>
              <label class="block text-sm font-medium text-on-surface-variant mb-1">Hora</label>
              <input type="time" id="horaInput" class="w-full border border-outline-variant rounded-xl px-4 py-2.5 bg-background focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" required>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-on-surface-variant mb-1">Tipo de Control</label>
            <select id="tipoControlInput" class="w-full border border-outline-variant rounded-xl px-4 py-2.5 bg-background focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all">
              <option value="General">General</option>
              <option value="Refracción">Refracción</option>
              <option value="Control">Control</option>
              <option value="Emergencia">Emergencia</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-on-surface-variant mb-1">Estado</label>
            <select id="estadoInput" class="w-full border border-outline-variant rounded-xl px-4 py-2.5 bg-background focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all">
              <option value="Pendiente">Pendiente</option>
              <option value="Confirmada">Confirmada</option>
              <option value="Asistió">Asistió</option>
              <option value="Cancelada">Cancelada</option>
            </select>
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button type="submit" class="flex-1 bg-primary text-white py-2.5 rounded-xl font-semibold hover:opacity-90 active:scale-95 transition-all">Guardar</button>
          <button type="button" id="cancelModalBtn" class="flex-1 bg-surface-container text-on-surface-variant py-2.5 rounded-xl font-semibold border border-outline-variant hover:bg-surface-container-high transition-all">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="app.js"></script>
  <script>
    // ====== CONFIGURACIÓN ======
    const urlParams = new URLSearchParams(window.location.search);
    const opticaId = urlParams.get('cliente') || 'default';
    const API_URL = 'https://script.google.com/macros/s/AKfycbxgPwPTWIIB3eGRaLZKCrzqfi_xL_66QlmVXsTC078i4h7g5caafH3ZR9ng4qI6szAH_Q/exec';

    // ====== ELEMENTOS ======
    const listContainer = document.getElementById('appointmentsList');
    const modal = document.getElementById('appointmentModal');
    const form = document.getElementById('appointmentForm');
    const editId = document.getElementById('editId');
    const pacienteInput = document.getElementById('pacienteInput');
    const especialistaInput = document.getElementById('especialistaInput');
    const fechaInput = document.getElementById('fechaInput');
    const horaInput = document.getElementById('horaInput');
    const tipoControlInput = document.getElementById('tipoControlInput');
    const estadoInput = document.getElementById('estadoInput');
    const modalTitle = document.getElementById('modalTitle');
    const closeModal = document.getElementById('closeModal');
    const cancelModalBtn = document.getElementById('cancelModalBtn');
    const newAppointmentBtn = document.getElementById('newAppointmentBtn');

    // ====== FUNCIONES ======
    async function loadAppointments(filter = 'all') {
      try {
        const response = await fetch(`${API_URL}?action=getAppointments&id=${opticaId}`);
        const citas = await response.json();
        renderAppointments(citas, filter);
      } catch (error) {
        listContainer.innerHTML = `<div class="text-center text-error py-10">❌ Error al cargar citas: ${error.message}</div>`;
        console.error(error);
      }
    }

    function renderAppointments(citas, filter) {
      if (!citas || citas.length === 0) {
        listContainer.innerHTML = `<div class="text-center text-on-surface-variant py-10">No hay citas programadas.</div>`;
        return;
      }

      let filtered = citas;
      if (filter !== 'all') {
        filtered = citas.filter(c => c['Estado Cita']?.toLowerCase() === filter);
      }

      if (filtered.length === 0) {
        listContainer.innerHTML = `<div class="text-center text-on-surface-variant py-10">No hay citas con el filtro "${filter}".</div>`;
        return;
      }

      let html = '';
      filtered.forEach(c => {
        const estado = c['Estado Cita'] || 'Pendiente';
        const estadoColor = {
          'Confirmada': 'text-green-600 bg-green-100',
          'Pendiente': 'text-yellow-600 bg-yellow-100',
          'Asistió': 'text-blue-600 bg-blue-100',
          'Cancelada': 'text-red-600 bg-red-100'
        }[estado] || 'text-gray-600 bg-gray-100';

        html += `
          <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow flex flex-col md:flex-row items-start md:items-center justify-between gap-4 appointment-item">
            <div class="flex items-start gap-4">
              <div class="bg-primary/10 p-3 rounded-xl">
                <span class="material-symbols-outlined text-primary text-3xl">event_available</span>
              </div>
              <div>
                <h3 class="font-bold text-lg">${c['Nombre Paciente'] || 'Paciente'}</h3>
                <div class="flex flex-wrap gap-x-4 gap-y-1 text-sm text-on-surface-variant">
                  <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">schedule</span> ${c['Hora Cita'] || '--:--'}</span>
                  <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">person</span> ${c['Especialista'] || 'N/A'}</span>
                  <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">event</span> ${c['Fecha Cita (AAAA-MM-DD)'] || 'Fecha no definida'}</span>
                  <span class="px-2 py-0.5 rounded-full text-xs font-semibold ${estadoColor}">${estado}</span>
                </div>
              </div>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
              <button class="edit-btn flex-1 md:flex-none bg-primary text-white px-4 py-2 rounded-lg font-medium hover:opacity-90 transition-all active:scale-95" data-id="${c['ID Cita']}">Editar</button>
              <button class="delete-btn flex-1 md:flex-none bg-error-container text-error px-4 py-2 rounded-lg font-medium hover:bg-red-100 transition-all active:scale-95" data-id="${c['ID Cita']}">Eliminar</button>
            </div>
          </div>
        `;
      });

      listContainer.innerHTML = html;

      // Event listeners para botones de editar y eliminar
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-id');
          const cita = citas.find(c => c['ID Cita'] == id);
          if (cita) openModal(cita);
        });
      });

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          if (confirm('¿Eliminar esta cita?')) {
            try {
              const response = await fetch(`${API_URL}?action=deleteAppointment&id=${opticaId}&citaId=${id}`);
              const result = await response.json();
              if (result.success) {
                loadAppointments();
              } else {
                alert('Error al eliminar: ' + (result.error || ''));
              }
            } catch (error) {
              alert('Error de conexión.');
            }
          }
        });
      });
    }

    // ====== MODAL ======
    function openModal(cita = null) {
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      if (cita) {
        modalTitle.textContent = 'Editar Cita';
        editId.value = cita['ID Cita'] || '';
        pacienteInput.value = cita['Nombre Paciente'] || '';
        especialistaInput.value = cita['Especialista'] || '';
        fechaInput.value = cita['Fecha Cita (AAAA-MM-DD)'] || '';
        horaInput.value = cita['Hora Cita'] || '';
        tipoControlInput.value = cita['Tipo de Control'] || 'General';
        estadoInput.value = cita['Estado Cita'] || 'Pendiente';
      } else {
        modalTitle.textContent = 'Nueva Cita';
        editId.value = '';
        form.reset();
        // valores por defecto
        const today = new Date().toISOString().split('T')[0];
        fechaInput.value = today;
        horaInput.value = '09:00';
        estadoInput.value = 'Pendiente';
      }
    }

    function closeModalFn() {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // ====== EVENTOS DEL MODAL ======
    closeModal.addEventListener('click', closeModalFn);
    cancelModalBtn.addEventListener('click', closeModalFn);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModalFn();
    });

    newAppointmentBtn.addEventListener('click', () => openModal());

    // ====== GUARDAR CITA (submit) ======
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        'ID Cita': editId.value || null,
        'Nombre Paciente': pacienteInput.value.trim(),
        'Especialista': especialistaInput.value.trim(),
        'Fecha Cita (AAAA-MM-DD)': fechaInput.value,
        'Hora Cita': horaInput.value,
        'Tipo de Control': tipoControlInput.value,
        'Estado Cita': estadoInput.value,
        // Se podría añadir más campos si existen en la hoja
      };

      try {
        const params = new URLSearchParams({
          action: 'saveAppointment',
          id: opticaId,
          cita: JSON.stringify(data)
        });
        const response = await fetch(`${API_URL}?${params.toString()}`, { method: 'GET' });
        const result = await response.json();
        if (result.success) {
          closeModalFn();
          loadAppointments();
        } else {
          alert('Error al guardar: ' + (result.error || ''));
        }
      } catch (error) {
        alert('Error de conexión: ' + error.message);
      }
    });

    // ====== FILTROS ======
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.remove('bg-primary', 'text-white');
          b.classList.add('bg-surface', 'text-on-surface-variant');
        });
        btn.classList.add('bg-primary', 'text-white');
        btn.classList.remove('bg-surface', 'text-on-surface-variant');
        const filter = btn.getAttribute('data-filter');
        loadAppointments(filter);
      });
    });

    // ====== INICIO ======
    loadAppointments();
  </script>
</body>
</html>
