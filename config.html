<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurar Óptica | Panel de Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --primary-brand: #7B2FBE;
      --primary-hover: #63229e;
      --success: #10b981;
      --error: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 680px;
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border-color);
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-weight: 700;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-weight: 500;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-main);
    }

    .form-group input[type="text"],
    .form-group select {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text-main);
      background-color: #fff;
      transition: all 0.2s ease;
      outline: none;
    }

    .form-group input[type="text"]:focus,
    .form-group select:focus {
      border-color: var(--primary-brand);
      box-shadow: 0 0 0 3px rgba(123, 47, 190, 0.15);
    }

    .file-upload-wrapper {
      position: relative;
      border: 2px dashed var(--border-color);
      border-radius: 8px;
      padding: 1.2rem;
      text-align: center;
      background: #fdfdfd;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .file-upload-wrapper:hover {
      background: #f8fafc;
      border-color: var(--text-muted);
    }
    .file-upload-wrapper input[type="file"] {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .file-upload-text {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .file-upload-text span {
      color: var(--primary-brand);
      font-weight: 600;
    }

    .current-logo {
      margin-top: 0.6rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .current-logo a {
      color: var(--primary-brand);
      text-decoration: none;
      font-weight: 500;
    }
    .current-logo a:hover { text-decoration: underline; }

    .colors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .color-card {
      background: #f8fafc;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .color-card label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .color-picker-wrapper {
      width: 100%;
      height: 40px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      position: relative;
    }

    .color-picker-wrapper input[type="color"] {
      position: absolute;
      top: -5px; left: -5px; width: 120%; height: 120%;
      cursor: pointer;
      border: none;
      background: none;
    }

    button[type="submit"] {
      background: var(--primary-brand);
      color: white;
      border: none;
      padding: 0.85rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 1rem;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(123, 47, 190, 0.2);
    }

    button[type="submit"]:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    #message {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      font-weight: 500;
      display: none;
    }

    .preview-section {
      margin-top: 2.5rem;
    }

    .preview-box {
      padding: 2.5rem 1.5rem;
      border-radius: 12px;
      background: #424242;
      color: #FFFFFF;
      border: 1px solid var(--border-color);
      text-align: center;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      min-height: 160px;
    }

    .preview-box img {
      max-height: 70px;
      object-fit: contain;
      border-radius: 4px;
    }

    .preview-box .name {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    @media (max-width: 480px) {
      .container { padding: 1.5rem; }
      .colors-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>⚙️ Configurar Óptica</h1>
      <p>Personaliza la apariencia visual e identidad de tu sucursal</p>
    </div>

    <form id="configForm" enctype="multipart/form-data">
      
      <div class="section-title">Información Básica</div>
      
      <div class="form-group">
        <label for="nombre">Nombre de la óptica</label>
        <input type="text" id="nombre" placeholder="Ej: Óptica GM" autocomplete="off">
      </div>

      <div class="form-group">
        <label>Logotipo de la sucursal</label>
        <div class="file-upload-wrapper">
          <div class="file-upload-text" id="uploadText">Suelte su imagen aquí o <span>búsquela en su equipo</span></div>
          <input type="file" id="logoFile" accept="image/*">
        </div>
        <div class="current-logo" id="currentLogoDisplay">Logo guardado: <span id="logoUrlText">Ninguno</span></div>
      </div>

      <div class="section-title">Paleta Cromática</div>
      
      <div class="colors-grid">
        <div class="color-card">
          <label for="primary">Primario</label>
          <div class="color-picker-wrapper"><input type="color" id="primary" value="#7B2FBE"></div>
        </div>
        <div class="color-card">
          <label for="secondary">Secundario</label>
          <div class="color-picker-wrapper"><input type="color" id="secondary" value="#2E7D32"></div>
        </div>
        <div class="color-card">
          <label for="tertiary">Terciario</label>
          <div class="color-picker-wrapper"><input type="color" id="tertiary" value="#0288D1"></div>
        </div>
        <div class="color-card">
          <label for="neutral">Neutral</label>
          <div class="color-picker-wrapper"><input type="color" id="neutral" value="#424242"></div>
        </div>
        <div class="color-card">
          <label for="color_texto">Texto Preview</label>
          <div class="color-picker-wrapper"><input type="color" id="color_texto" value="#FFFFFF"></div>
        </div>
        <div class="color-card">
          <label for="color_fondo">Fondo Preview</label>
          <div class="color-picker-wrapper"><input type="color" id="color_fondo" value="#424242"></div>
        </div>
      </div>

      <div class="section-title">Tipografía del Sistema</div>

      <div class="form-group">
        <label for="font_family">Familia tipográfica fuente</label>
        <select id="font_family">
          <option value="Inter">Inter</option>
          <option value="Roboto">Roboto</option>
          <option value="Open Sans">Open Sans</option>
          <option value="Lato">Lato</option>
          <option value="Montserrat">Montserrat</option>
          <option value="Poppins">Poppins</option>
          <option value="Nunito">Nunito</option>
        </select>
      </div>

      <button type="submit" id="btnSubmit">Guardar todos los cambios</button>
    </form>

    <div id="message"></div>

    <div class="preview-section">
      <div class="section-title">Vista previa en tiempo real</div>
      <div class="preview-box" id="preview">
        <img id="previewLogo" src="" alt="Logo" style="display:none;">
        <div class="name" id="previewName">Nombre de la óptica</div>
      </div>
    </div>
  </div>

  <script>
    // ====== CONFIGURACIÓN ======
    const urlParams = new URLSearchParams(window.location.search);
    const opticaId = urlParams.get('cliente') || 'default';
    // REEMPLAZA ESTA URL CON LA DE TU WEB APP (sin los "...")
    const API_URL = 'https://script.google.com/macros/s/AKfycbxuUcQBLRFuiteqrDAXw9A54yZgKlPyiEr7Vu0lwE90toR3aw6XkBJM3AsWEqir0OPvDg/exec';

    // ====== ELEMENTOS ======
    const form = document.getElementById('configForm');
    const btnSubmit = document.getElementById('btnSubmit');
    const message = document.getElementById('message');
    const previewBox = document.getElementById('preview');
    const previewLogo = document.getElementById('previewLogo');
    const previewName = document.getElementById('previewName');
    const logoUrlText = document.getElementById('logoUrlText');
    const fileInput = document.getElementById('logoFile');
    const uploadText = document.getElementById('uploadText');

    // ====== ACTUALIZAR VISTA PREVIA INSTANTÁNEA ======
    function livePreview() {
      const nombre = document.getElementById('nombre').value;
      const colFondo = document.getElementById('color_fondo').value;
      const colTexto = document.getElementById('color_texto').value;
      const fontFam = document.getElementById('font_family').value;

      previewName.textContent = nombre.trim() !== "" ? nombre : "Nombre de la óptica";
      previewBox.style.backgroundColor = colFondo;
      previewBox.style.color = colTexto;
      previewBox.style.fontFamily = fontFam;
    }

    document.getElementById('nombre').addEventListener('input', livePreview);
    document.getElementById('color_fondo').addEventListener('input', livePreview);
    document.getElementById('color_texto').addEventListener('input', livePreview);
    document.getElementById('font_family').addEventListener('change', livePreview);

    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        uploadText.innerHTML = `Archivo seleccionado: <strong>${file.name}</strong>`;
        const reader = new FileReader();
        reader.onload = function(event) {
          previewLogo.src = event.target.result;
          previewLogo.style.display = 'inline';
        }
        reader.readAsDataURL(file);
      }
    });

    function showMessage(text, type) {
      message.textContent = text;
      message.style.display = 'block';
      if(type === 'success') {
        message.style.backgroundColor = '#ecfdf5';
        message.style.color = 'var(--success)';
        message.style.border = '1px solid #a7f3d0';
      } else if (type === 'error') {
        message.style.backgroundColor = '#fef2f2';
        message.style.color = 'var(--error)';
        message.style.border = '1px solid #fca5a5';
      } else {
        message.style.backgroundColor = '#f1f5f9';
        message.style.color = 'var(--text-main)';
        message.style.border = '1px solid var(--border-color)';
      }
    }

    // ====== CARGAR CONFIGURACIÓN ======
    async function loadConfig() {
      try {
        const res = await fetch(`${API_URL}?action=get&id=${opticaId}`);
        const config = await res.json();
        if (config) {
          document.getElementById('nombre').value = config.nombre_optica || '';
          
          if (config.logo_url) {
            logoUrlText.innerHTML = `<a href="${config.logo_url}" target="_blank">Ver logo actual</a>`;
            previewLogo.src = config.logo_url;
            previewLogo.style.display = 'inline';
          } else {
            logoUrlText.textContent = 'Ninguno';
            previewLogo.style.display = 'none';
          }
          
          document.getElementById('primary').value = config.primary || '#7B2FBE';
          document.getElementById('secondary').value = config.secondary || '#2E7D32';
          document.getElementById('tertiary').value = config.tertiary || '#0288D1';
          document.getElementById('neutral').value = config.neutral || '#424242';
          document.getElementById('color_texto').value = config.color_texto || '#FFFFFF';
          document.getElementById('color_fondo').value = config.color_fondo || '#424242';
          document.getElementById('font_family').value = config.font_family || 'Inter';
          
          livePreview();
        }
      } catch (error) {
        console.error('Error al cargar la configuración inicial:', error);
        showMessage('Error al cargar la configuración. Verifica la conexión.', 'error');
      }
    }

    // ====== GUARDAR CAMBIOS (SOLO CON GET) ======
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Guardando configuración...';
      showMessage('Procesando datos...', 'info');

      // Obtener todos los valores
      const configData = {
        nombre_optica: document.getElementById('nombre').value,
        primary: document.getElementById('primary').value,
        secondary: document.getElementById('secondary').value,
        tertiary: document.getElementById('tertiary').value,
        neutral: document.getElementById('neutral').value,
        color_texto: document.getElementById('color_texto').value,
        color_fondo: document.getElementById('color_fondo').value,
        font_family: document.getElementById('font_family').value,
      };

      // Si se seleccionó un archivo, lo convertimos a base64 y lo enviamos en la URL
      const file = fileInput.files[0];
      if (file) {
        try {
          // Leer el archivo como base64
          const reader = new FileReader();
          const base64 = await new Promise((resolve, reject) => {
            reader.onload = () => resolve(reader.result.split(',')[1]); // solo la parte base64
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
          // Agregar al objeto configData (el backend decodificará)
          configData.logo_base64 = base64;
          configData.logo_filename = file.name;
        } catch (err) {
          showMessage('Error al procesar el archivo: ' + err.message, 'error');
          btnSubmit.disabled = false;
          btnSubmit.textContent = 'Guardar todos los cambios';
          return;
        }
      }

      try {
        // Codificar el objeto completo como JSON
        const jsonData = JSON.stringify(configData);
        // Construir URL con todos los parámetros
        const params = new URLSearchParams({
          action: 'set',
          id: opticaId,
          config: jsonData
        });

        const response = await fetch(`${API_URL}?${params.toString()}`);
        const result = await response.json();

        if (result.success) {
          showMessage('¡✅ Configuración guardada correctamente!', 'success');
          uploadText.innerHTML = `Suelte su imagen aquí o <span>búsquela en su equipo</span>`;
          fileInput.value = '';
          // Recargar configuración para actualizar vista
          await loadConfig();
        } else {
          throw new Error(result.error || 'Error al guardar');
        }
      } catch (error) {
        showMessage('❌ Error: ' + error.message, 'error');
        console.error(error);
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Guardar todos los cambios';
      }
    });

    // Inicializar
    loadConfig();
  </script>
</body>
</html>
