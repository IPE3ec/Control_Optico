<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Óptico - Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: radial-gradient(circle at top right, #f8fafc 0%, #e0e7ff 100%); 
    }
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 antialiased selection:bg-blue-500 selection:text-white">

  <div class="max-w-md w-full bg-white rounded-3xl shadow-[0_20px_50px_rgba(0,63,135,0.08)] overflow-hidden border border-gray-100/80 backdrop-blur-sm transition-all duration-300">
    
    <div class="bg-gradient-to-br from-[#002d5e] via-[#003f87] to-[#0056b3] px-8 py-7 text-white relative overflow-hidden">
      <div class="absolute -right-10 -top-10 w-32 h-32 bg-white/5 rounded-full blur-xl"></div>
      <div class="flex items-center gap-3.5 relative z-10">
        <div class="bg-white/10 p-2 rounded-2xl backdrop-blur-md border border-white/10 flex items-center justify-center shadow-inner">
          <span class="material-symbols-outlined text-3xl text-blue-200">visibility</span>
        </div>
        <div>
          <span class="font-extrabold text-2xl tracking-tight bg-gradient-to-r from-white to-blue-100 bg-clip-text text-transparent">Control Óptico</span>
          <p class="text-xs text-blue-200/90 font-medium mt-0.5 tracking-wide">Gestión profesional para ópticas</p>
        </div>
      </div>
      <p class="text-xs text-blue-100/80 mt-4 font-normal relative z-10 bg-black/10 px-3 py-1.5 rounded-lg inline-block border border-white/5">
        Accede o regístrate para administrar tu óptica
      </p>
    </div>

    <div id="appContent" class="p-8"></div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwa0UMBrZWjGMGkKxvM4X1Wnb5i4M515f5Z_c9JNTpeRMniI_Q_UxlyQXqGd35rpYt1BQ/exec'; 
    let currentView = 'login';
    let currentUserEmail = null;
    let planSeleccionado = false;

    async function apiRequest(action, params = {}, disableButton = null) {
      if (disableButton) {
        disableButton.disabled = true;
        disableButton.classList.add('opacity-60', 'cursor-not-allowed');
      }
      try {
        const query = new URLSearchParams({ action, ...params }).toString();
        const url = `${API_URL}?${query}`;
        const response = await fetch(url, { method: 'GET', mode: 'cors' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (err) {
        throw new Error('No se pudo conectar con el servidor.');
      } finally {
        if (disableButton) {
          disableButton.disabled = false;
          disableButton.classList.remove('opacity-60', 'cursor-not-allowed');
        }
      }
    }

    function renderLogin() {
      return `
        <div class="animate-fade-in">
          <h2 class="text-2xl font-bold text-gray-800 tracking-tight">🔐 Iniciar sesión</h2>
          <p class="text-gray-400 text-sm mt-1 mb-6">Ingresa tu correo y contraseña para continuar</p>
          
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Correo electrónico</label>
              <input type="email" id="loginEmail" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-3 text-sm transition-all focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none placeholder:text-gray-400 font-medium" placeholder="ejemplo@opticagm.com">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Contraseña</label>
              <input type="password" id="loginPassword" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-3 text-sm transition-all focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none placeholder:text-gray-400 font-medium" placeholder="••••••••">
            </div>
            
            <button id="doLoginBtn" class="w-full bg-[#003f87] hover:bg-[#002d5e] text-white py-3 rounded-xl font-semibold shadow-lg shadow-blue-900/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2">
              <span class="material-symbols-outlined text-lg">login</span> Ingresar al Sistema
            </button>
            
            <div class="border-t border-gray-100 my-6 pt-4 text-center">
              <p class="text-sm text-gray-500">¿No tienes cuenta aún? <button id="goToRegister" class="text-[#003f87] font-bold hover:underline ml-1">Regístrate aquí</button></p>
            </div>
          </div>
        </div>
      `;
    }

    function renderRegister() {
      return `
        <div class="animate-fade-in">
          <h2 class="text-2xl font-bold text-gray-800 tracking-tight">📝 Registro de óptica</h2>
          <p class="text-gray-400 text-sm mt-1 mb-4">Completa los datos para dar de alta tu sucursal</p>
          
          <div class="space-y-3.5 max-h-[420px] overflow-y-auto pr-1 custom-scroll">
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Nombre de la óptica / Doctor</label>
              <input id="regNombre" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm transition-all focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none" placeholder="Ej: Ópticas GM Centro">
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Ciudad</label>
                <input id="regCiudad" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm transition-all focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none" placeholder="Quito">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">RUC / ID</label>
                <input id="regRuc" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm transition-all focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none" placeholder="1790012345001">
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Dirección</label>
              <input id="regDireccion" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm transition-all focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none" placeholder="Av. Amazonas y NNUU">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Teléfono / WhatsApp</label>
              <input id="regTelefono" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm transition-all focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none" placeholder="0999123456">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Correo electrónico</label>
              <input type="email" id="regCorreo" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm transition-all focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none" placeholder="contacto@opticagm.com">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Contraseña</label>
              <input type="password" id="regPassword" class="w-full border border-gray-200 bg-gray-50/50 focus:bg-white rounded-xl px-4 py-2.5 text-sm transition-all focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none" placeholder="Mínimo 6 caracteres">
            </div>
          </div>

          <div class="mt-5 space-y-4">
            <button id="doRegisterBtn" class="w-full bg-[#003f87] hover:bg-[#002d5e] text-white py-3 rounded-xl font-semibold shadow-lg shadow-blue-900/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
              <span class="material-symbols-outlined text-lg">how_to_reg</span> Finalizar Registro
            </button>
            <p class="text-center text-sm text-gray-500">¿Ya tienes cuenta? <button id="goToLogin" class="text-[#003f87] font-bold hover:underline ml-1">Inicia sesión</button></p>
          </div>
        </div>
      `;
    }

    function renderPlans() {
      return `
        <div class="animate-fade-in">
          <h2 class="text-2xl font-bold text-gray-800 tracking-tight">💎 Elige tu plan</h2>
          <p class="text-sm text-gray-400 mt-1 mb-5">Selecciona la suscripción ideal para expandir tu negocio</p>
          
          <div id="planContainer" class="space-y-3">
            <div class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center hover:bg-blue-50/30 hover:border-blue-200 cursor-pointer transition-all duration-200 group" data-plan="gratis">
              <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-gray-400 group-hover:text-blue-600 transition-colors">auto_awesome</span>
                <div>
                  <span class="font-bold text-gray-800 text-base block group-hover:text-[#003f87]">Plan Gratis</span>
                  <span class="text-xs text-gray-400">7 días de prueba • Acceso completo</span>
                </div>
              </div>
              <span class="text-emerald-600 font-extrabold text-xl bg-emerald-50 px-3 py-1 rounded-xl">Gratis</span>
            </div>

            <div class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center hover:bg-blue-50/30 hover:border-blue-200 cursor-pointer transition-all duration-200 group" data-plan="mensual">
              <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-gray-400 group-hover:text-blue-600 transition-colors">calendar_month</span>
                <div>
                  <span class="font-bold text-gray-800 text-base block group-hover:text-[#003f87]">Plan Mensual</span>
                  <span class="text-xs text-gray-400">Facturación mes a mes</span>
                </div>
              </div>
              <span class="text-[#003f87] font-extrabold text-xl bg-blue-50 px-3 py-1 rounded-xl">$20</span>
            </div>

            <div class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center hover:bg-blue-50/30 hover:border-blue-200 cursor-pointer transition-all duration-200 group" data-plan="semestral">
              <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-gray-400 group-hover:text-blue-600 transition-colors">package_2</span>
                <div>
                  <span class="font-bold text-gray-800 text-base block group-hover:text-[#003f87]">Plan Semestral</span>
                  <span class="text-xs text-blue-600 font-medium bg-blue-50 px-2 py-0.5 rounded-md inline-block mt-0.5">Ahorra $10</span>
                </div>
              </div>
              <span class="text-[#003f87] font-extrabold text-xl bg-blue-50 px-3 py-1 rounded-xl">$110</span>
            </div>

            <div class="border-2 border-blue-500/30 bg-blue-50/10 rounded-2xl p-4 flex justify-between items-center hover:bg-blue-50/30 hover:border-blue-400 cursor-pointer transition-all duration-200 group relative" data-plan="anual">
              <div class="absolute -top-2.5 right-4 bg-gradient-to-r from-amber-500 to-orange-500 text-white text-[10px] font-extrabold px-2.5 py-0.5 rounded-full uppercase tracking-wider shadow-sm animate-pulse">Mejor Valor</div>
              <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-blue-600">verified</span>
                <div>
                  <span class="font-bold text-gray-800 text-base block group-hover:text-[#003f87]">Plan Anual</span>
                  <span class="text-xs text-emerald-600 font-medium bg-emerald-50 px-2 py-0.5 rounded-md inline-block mt-0.5">Ahorra $40 🔥</span>
                </div>
              </div>
              <span class="text-[#003f87] font-extrabold text-xl bg-blue-50 px-3 py-1 rounded-xl">$200</span>
            </div>
          </div>

          <div id="mensajePlan" class="mt-5 p-4 rounded-xl text-center text-sm font-medium hidden bg-gray-50 border border-gray-100"></div>
          
          <div class="mt-6 text-center text-xs text-gray-400 bg-gray-50/80 border border-gray-100 p-3 rounded-xl flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-sm text-gray-400">lock</span> Securizado mediante transferencia o enlace de pago directo.
          </div>
        </div>
      `;
    }

    function attachEvents() {
      if (currentView === 'login') {
        const loginBtn = document.getElementById('doLoginBtn');
        loginBtn?.addEventListener('click', async () => {
          const correo = document.getElementById('loginEmail').value.trim();
          const password = document.getElementById('loginPassword').value;
          if (!correo || !password) { alert('❌ Ingresa correo y contraseña'); return; }
          loginBtn.disabled = true;
          loginBtn.innerHTML = `<span class="material-symbols-outlined animate-spin text-lg">progress_activity</span> Verificando...`;
          try {
            const result = await apiRequest('login', { correo, password });
            if (result.success) {
              if (result.rol === 'admin') window.location.href = 'admin_panel.html';
              else { currentUserEmail = correo; currentView = 'plans'; renderApp(); }
            } else alert('⚠️ ' + (result.error || 'Credenciales incorrectas'));
          } catch (err) { alert('🚫 Error: ' + err.message); }
          finally { loginBtn.disabled = false; loginBtn.innerHTML = `<span class="material-symbols-outlined text-lg">login</span> Ingresar al Sistema`; }
        });
        document.getElementById('goToRegister')?.addEventListener('click', () => { currentView = 'register'; renderApp(); });
      }
      else if (currentView === 'register') {
        const regBtn = document.getElementById('doRegisterBtn');
        regBtn?.addEventListener('click', async () => {
          const nombre = document.getElementById('regNombre').value.trim();
          const ciudad = document.getElementById('regCiudad').value.trim();
          const ruc = document.getElementById('regRuc').value.trim();
          const direccion = document.getElementById('regDireccion').value.trim();
          const telefono = document.getElementById('regTelefono').value.trim();
          const correo = document.getElementById('regCorreo').value.trim();
          const password = document.getElementById('regPassword').value;
          if (!nombre || !ciudad || !correo || !password) { alert('❌ Completa los campos obligatorios'); return; }
          regBtn.disabled = true;
          regBtn.innerHTML = `<span class="material-symbols-outlined animate-spin text-lg">progress_activity</span> Registrando...`;
          try {
            const result = await apiRequest('register', { nombre, ciudad, ruc, direccion, telefono, correo, password });
            if (result.success) { currentUserEmail = correo; currentView = 'plans'; renderApp(); }
            else alert('❌ Error: ' + (result.error || 'No se pudo registrar'));
          } catch (err) { alert('🚫 Error de conexión: ' + err.message); }
          finally { regBtn.disabled = false; regBtn.innerHTML = `<span class="material-symbols-outlined text-lg">how_to_reg</span> Finalizar Registro`; }
        });
        document.getElementById('goToLogin')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
      }
      else if (currentView === 'plans') {
        const planCards = document.querySelectorAll('[data-plan]');
        const mensajeDiv = document.getElementById('mensajePlan');
        let yaEnviado = false;
        planCards.forEach(card => {
          card.addEventListener('click', async (e) => {
            if (yaEnviado) { alert('Ya has enviado una solicitud de plan. Espera la aprobación del administrador.'); return; }
            const plan = card.getAttribute('data-plan');
            let monto = 0, duracionDias = 0;
            switch(plan) {
              case 'gratis': monto = 0; duracionDias = 7; break;
              case 'mensual': monto = 20; duracionDias = 30; break;
              case 'semestral': monto = 110; duracionDias = 180; break;
              case 'anual': monto = 200; duracionDias = 365; break;
            }
            if (!currentUserEmail) { alert('Error: usuario no identificado'); return; }
            
            planCards.forEach(c => { c.style.pointerEvents = 'none'; c.classList.add('opacity-40'); });
            card.classList.remove('opacity-40');
            card.classList.add('border-blue-600', 'bg-blue-50/40');
            
            mensajeDiv.classList.remove('hidden');
            mensajeDiv.innerHTML = '<span class="text-blue-600 flex items-center justify-center gap-2"><span class="material-symbols-outlined animate-spin">progress_activity</span> Procesando tu solicitud de plan...</span>';
            try {
              const result = await apiRequest('savePlan', { correo: currentUserEmail, plan, monto, duracionDias });
              if (result.success) {
                yaEnviado = true;
                mensajeDiv.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-700');
                mensajeDiv.innerHTML = '<span class="flex items-center justify-center gap-2"><span class="material-symbols-outlined text-lg">check_circle</span> ¡Solicitud enviada! El administrador activará tu acceso de inmediato.</span>';
                planCards.forEach(c => { c.style.pointerEvents = 'none'; });
              } else {
                alert('⚠️ Error al guardar el plan: ' + (result.error || 'Intenta nuevamente'));
                planCards.forEach(c => { c.style.pointerEvents = 'auto'; c.classList.remove('opacity-40', 'border-blue-600', 'bg-blue-50/40'); });
                mensajeDiv.classList.add('hidden');
              }
            } catch (err) {
              alert('🚫 Error: ' + err.message);
              planCards.forEach(c => { c.style.pointerEvents = 'auto'; c.classList.remove('opacity-40', 'border-blue-600', 'bg-blue-50/40'); });
              mensajeDiv.classList.add('hidden');
            }
          });
        });
      }
    }

    function renderApp() {
      let html = '';
      if (currentView === 'login') html = renderLogin();
      else if (currentView === 'register') html = renderRegister();
      else if (currentView === 'plans') html = renderPlans();
      document.getElementById('appContent').innerHTML = html;
      attachEvents();
    }
    renderApp();
  </script>
</body>
</html>
