<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Control Óptico - Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e6edf8 100%);
    }
    .btn-scale:active {
      transform: scale(0.96);
      transition: transform 0.1s ease;
    }
    .transition-smooth {
      transition: all 0.2s ease;
    }
    input:focus {
      outline: none;
      ring: 2px solid #003f87;
      border-color: #003f87;
    }
    .animate-pulse-light {
      animation: pulseLight 1.5s infinite;
    }
    @keyframes pulseLight {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 transform transition-all duration-300 hover:shadow-xl">
    <!-- Header con nombre del sistema -->
    <div class="bg-gradient-to-r from-[#002d5e] to-[#003f87] px-6 py-5 text-white">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-3xl">visibility</span>
        <div>
          <span class="font-extrabold text-2xl tracking-tight">Control Óptico</span>
          <p class="text-xs text-blue-100 mt-0.5">Gestión profesional para ópticas</p>
        </div>
      </div>
      <p class="text-sm text-blue-50 mt-2 opacity-90">Accede o regístrate para administrar tu óptica</p>
    </div>

    <div id="appContent" class="p-6">
      <!-- Contenido dinámico renderizado por JS -->
    </div>
  </div>

  <script>
    // 🔁 REEMPLAZA ESTA URL CON LA DE TU WEB APP DE APPS SCRIPT (la última desplegada)
    const API_URL = 'https://script.google.com/macros/s/AKfycbydrkD4E9bRcFZap1uHa_fPBcy-9Y6d3Wlh_MD7UduTX8T3S-U0wvqj1lEvHB4LzZ7qDw/exec';

    let currentView = 'login';    // 'login', 'register', 'plans'
    let currentUserEmail = null;

    // Función genérica para llamar a la API con prevención de envíos múltiples
    async function apiRequest(action, params = {}, disableButton = null) {
      if (disableButton) {
        disableButton.disabled = true;
        disableButton.classList.add('opacity-60', 'cursor-not-allowed');
      }
      try {
        const query = new URLSearchParams({ action, ...params }).toString();
        const url = `${API_URL}?${query}`;
        const response = await fetch(url, { method: 'GET', mode: 'cors' });
        if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
        const data = await response.json();
        return data;
      } catch (err) {
        console.error("API Error:", err);
        throw new Error('No se pudo conectar con el servidor. Verifica tu conexión o contacta al administrador.');
      } finally {
        if (disableButton) {
          disableButton.disabled = false;
          disableButton.classList.remove('opacity-60', 'cursor-not-allowed');
        }
      }
    }

    // --- Vistas con mejor UX y ejemplos ---
    function renderLogin() {
      return `
        <h2 class="text-2xl font-bold text-gray-800 mb-2">🔐 Iniciar sesión</h2>
        <p class="text-gray-500 text-sm mb-5">Ingresa tu correo electrónico y contraseña</p>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Correo electrónico</label>
            <input type="email" id="loginEmail" class="mt-1 w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-[#003f87] focus:border-[#003f87] transition-smooth" placeholder="ejemplo@opticagm.com">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Contraseña</label>
            <input type="password" id="loginPassword" class="mt-1 w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-[#003f87] focus:border-[#003f87]" placeholder="••••••••">
          </div>
          <button id="doLoginBtn" class="w-full bg-[#003f87] text-white py-2.5 rounded-xl font-semibold shadow-md btn-scale transition-smooth hover:bg-[#002d5e] flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-xl">login</span> Ingresar
          </button>
          <p class="text-center text-sm text-gray-500">¿No tienes cuenta? <button id="goToRegister" class="text-[#003f87] font-semibold hover:underline">Regístrate aquí</button></p>
        </div>
      `;
    }

    function renderRegister() {
      return `
        <h2 class="text-2xl font-bold text-gray-800 mb-1">📝 Registro de óptica</h2>
        <p class="text-gray-500 text-sm mb-4">Completa todos los campos para crear tu cuenta</p>
        <div class="space-y-3 max-h-[460px] overflow-y-auto pr-1 custom-scroll">
          <div><label class="block text-sm font-medium text-gray-700">Nombre de la óptica / Doctor</label><input id="regNombre" class="w-full border border-gray-300 rounded-xl px-4 py-2.5" placeholder="Ej: Ópticas GM Centro"></div>
          <div><label class="block text-sm font-medium text-gray-700">Ciudad</label><input id="regCiudad" class="w-full border border-gray-300 rounded-xl px-4 py-2.5" placeholder="Quito, Guayaquil, Cuenca..."></div>
          <div><label class="block text-sm font-medium text-gray-700">RUC / Identificación</label><input id="regRuc" class="w-full border border-gray-300 rounded-xl px-4 py-2.5" placeholder="1790012345001"></div>
          <div><label class="block text-sm font-medium text-gray-700">Dirección</label><input id="regDireccion" class="w-full border border-gray-300 rounded-xl px-4 py-2.5" placeholder="Av. Amazonas y Naciones Unidas"></div>
          <div><label class="block text-sm font-medium text-gray-700">Teléfono / WhatsApp</label><input id="regTelefono" class="w-full border border-gray-300 rounded-xl px-4 py-2.5" placeholder="09991234567"></div>
          <div><label class="block text-sm font-medium text-gray-700">Correo electrónico</label><input type="email" id="regCorreo" class="w-full border border-gray-300 rounded-xl px-4 py-2.5" placeholder="contacto@opticagm.com"></div>
          <div><label class="block text-sm font-medium text-gray-700">Contraseña</label><input type="password" id="regPassword" class="w-full border border-gray-300 rounded-xl px-4 py-2.5" placeholder="Mínimo 6 caracteres"></div>
          <button id="doRegisterBtn" class="w-full bg-[#003f87] text-white py-2.5 rounded-xl font-semibold btn-scale transition-smooth hover:bg-[#002d5e] flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">how_to_reg</span> Registrarse
          </button>
          <p class="text-center text-sm">¿Ya tienes cuenta? <button id="goToLogin" class="text-[#003f87] font-semibold hover:underline">Inicia sesión</button></p>
        </div>
      `;
    }

    function renderPlans() {
      return `
        <h2 class="text-2xl font-bold text-gray-800">💎 Elige tu plan</h2>
        <p class="text-sm text-gray-500 mb-4">Selecciona la suscripción que mejor se adapte a tu negocio</p>
        <div class="space-y-3">
          <div class="border-2 rounded-xl p-4 flex justify-between items-center hover:bg-gray-50 cursor-pointer transition-all hover:shadow-md" data-plan="gratis">
            <div><span class="font-bold text-lg">Plan Gratis</span><span class="text-xs block text-gray-500">7 días de prueba • Acceso completo</span></div>
            <span class="text-green-600 font-bold text-xl">$0</span>
          </div>
          <div class="border-2 rounded-xl p-4 flex justify-between items-center hover:bg-gray-50 cursor-pointer transition-all hover:shadow-md" data-plan="mensual">
            <div><span class="font-bold text-lg">Plan Mensual</span><span class="text-xs block text-gray-500">Facturación mes a mes</span></div>
            <span class="text-[#003f87] font-bold text-xl">$20</span>
          </div>
          <div class="border-2 rounded-xl p-4 flex justify-between items-center hover:bg-gray-50 cursor-pointer transition-all hover:shadow-md" data-plan="semestral">
            <div><span class="font-bold text-lg">Plan Semestral</span><span class="text-xs block text-gray-500">6 meses • Ahorra $10</span></div>
            <span class="text-[#003f87] font-bold text-xl">$110</span>
          </div>
          <div class="border-2 rounded-xl p-4 flex justify-between items-center hover:bg-gray-50 cursor-pointer transition-all hover:shadow-md" data-plan="anual">
            <div><span class="font-bold text-lg">Plan Anual</span><span class="text-xs block text-gray-500">12 meses • Ahorra $40</span></div>
            <span class="text-[#003f87] font-bold text-xl">$200</span>
          </div>
        </div>
        <div class="mt-6 text-center text-xs text-gray-400 bg-gray-50 p-2 rounded-lg">🔒 Pago seguro mediante transferencia o enlace de pago.</div>
      `;
    }

    // --- Manejo de eventos con prevención de doble clic ---
    function attachEvents() {
      if (currentView === 'login') {
        const loginBtn = document.getElementById('doLoginBtn');
        if (loginBtn) {
          loginBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const correo = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!correo || !password) { alert('❌ Por favor ingresa correo y contraseña'); return; }
            try {
              loginBtn.disabled = true;
              loginBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Verificando...`;
              const result = await apiRequest('login', { correo, password });
              if (result.success) {
                if (result.rol === 'admin') {
                  window.location.href = 'admin_panel.html';
                } else {
                  currentUserEmail = correo;
                  currentView = 'plans';
                  renderApp();
                }
              } else {
                alert('⚠️ ' + (result.error || 'Credenciales incorrectas'));
              }
            } catch (err) { alert('🚫 Error: ' + err.message); }
            finally {
              loginBtn.disabled = false;
              loginBtn.innerHTML = `<span class="material-symbols-outlined text-xl">login</span> Ingresar`;
            }
          });
        }
        document.getElementById('goToRegister')?.addEventListener('click', () => { currentView = 'register'; renderApp(); });
      }
      else if (currentView === 'register') {
        const regBtn = document.getElementById('doRegisterBtn');
        if (regBtn) {
          regBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const nombre = document.getElementById('regNombre').value.trim();
            const ciudad = document.getElementById('regCiudad').value.trim();
            const ruc = document.getElementById('regRuc').value.trim();
            const direccion = document.getElementById('regDireccion').value.trim();
            const telefono = document.getElementById('regTelefono').value.trim();
            const correo = document.getElementById('regCorreo').value.trim();
            const password = document.getElementById('regPassword').value;
            if (!nombre || !ciudad || !correo || !password) {
              alert('❌ Por favor completa todos los campos obligatorios (*)');
              return;
            }
            try {
              regBtn.disabled = true;
              regBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Registrando...`;
              const result = await apiRequest('register', { nombre, ciudad, ruc, direccion, telefono, correo, password });
              if (result.success) {
                currentUserEmail = correo;
                currentView = 'plans';
                renderApp();
              } else {
                alert('❌ Error: ' + (result.error || 'No se pudo registrar. Intenta de nuevo.'));
              }
            } catch (err) { alert('🚫 Error de conexión: ' + err.message); }
            finally {
              regBtn.disabled = false;
              regBtn.innerHTML = `<span class="material-symbols-outlined">how_to_reg</span> Registrarse`;
            }
          });
        }
        document.getElementById('goToLogin')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
      }
      else if (currentView === 'plans') {
        const planCards = document.querySelectorAll('[data-plan]');
        planCards.forEach(card => {
          card.addEventListener('click', async (e) => {
            const plan = card.getAttribute('data-plan');
            let monto = 0, duracionDias = 0;
            switch(plan) {
              case 'gratis': monto = 0; duracionDias = 7; break;
              case 'mensual': monto = 20; duracionDias = 30; break;
              case 'semestral': monto = 110; duracionDias = 180; break;
              case 'anual': monto = 200; duracionDias = 365; break;
            }
            if (!currentUserEmail) { alert('Error: usuario no identificado'); return; }
            // Deshabilitar todas las tarjetas mientras se procesa para evitar doble selección
            planCards.forEach(c => c.style.pointerEvents = 'none');
            try {
              const result = await apiRequest('savePlan', { correo: currentUserEmail, plan, monto, duracionDias });
              if (result.success) {
                window.location.href = 'dashboard.html?email=' + encodeURIComponent(currentUserEmail);
              } else {
                alert('⚠️ Error al guardar el plan: ' + (result.error || 'Intenta nuevamente'));
              }
            } catch (err) { alert('🚫 Error: ' + err.message); }
            finally {
              planCards.forEach(c => c.style.pointerEvents = 'auto');
            }
          });
        });
      }
    }

    function renderApp() {
      let html = '';
      if (currentView === 'login') html = renderLogin();
      else if (currentView === 'register') html = renderRegister();
      else if (currentView === 'plans') html = renderPlans();
      document.getElementById('appContent').innerHTML = html;
      attachEvents();
    }

    renderApp();
  </script>
</body>
</html>
