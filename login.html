<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Control Óptico - Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7B2FBE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: radial-gradient(circle at top right, #fafafa 0%, #f3e5f5 100%); 
      color: #424242;
    }
    .modal-backdrop { background: rgba(66, 66, 66, 0.5); backdrop-filter: blur(6px); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-up { animation: fadeInUp 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
    
    /* Custom Scrollbar */
    .custom-scroll::-webkit-scrollbar { width: 5px; }
    .custom-scroll::-webkit-scrollbar-track { background: #f5f5f5; border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: #bdbdbd; }

    /* Enfoques e inputs basados en la paleta personalizada */
    input, select, textarea, button, .plan-card { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    input:focus, select:focus { outline: none; border-color: #7B2FBE; box-shadow: 0 0 0 4px rgba(123, 47, 190, 0.15); }
    
    /* Variables de Texto Neutro */
    .text-neutral-custom { color: #424242; }
    .border-neutral-custom { border-color: #e0e0e0; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 antialiased">

  <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl shadow-purple-900/5 overflow-hidden border border-gray-100">
    <!-- Encabezado con degradado del Color Primario (#7B2FBE) -->
    <div class="bg-gradient-to-br from-[#4a157d] via-[#7B2FBE] to-[#9c4dcc] px-8 py-8 text-white relative overflow-hidden">
      <div class="absolute -right-10 -top-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
      <div class="flex items-center gap-3.5 relative z-10">
        <div class="w-12 h-12 rounded-2xl bg-white/12 flex items-center justify-center backdrop-blur-md border border-white/20 shadow-inner">
          <span class="material-symbols-outlined text-2xl text-purple-100">visibility</span>
        </div>
        <div>
          <span class="font-extrabold text-2xl tracking-tight block">Control Óptico</span>
          <p class="text-xs text-purple-100/80 font-medium">Gestión inteligente y profesional de ópticas</p>
        </div>
      </div>
    </div>
    
    <!-- Contenedor Dinámico -->
    <div id="appContent" class="p-8"></div>
  </div>

  <!-- Modal de Agradecimiento - Color Secundario (#2E7D32) para Éxito -->
  <div id="thankyouModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop" style="display: none;">
    <div class="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl animate-fade-up border border-gray-100">
      <div class="text-center">
        <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-green-100">
          <span class="material-symbols-outlined text-3xl text-[#2E7D32]">check_circle</span>
        </div>
        <h3 class="text-xl font-bold text-[#424242]">¡Gracias por tu elección!</h3>
        <p class="text-gray-500 mt-2 text-sm leading-relaxed">Hemos recibido tu solicitud de suscripción. Nuestro equipo validará los datos de tu cuenta a la brevedad.</p>
        
        <div class="mt-6 space-y-2">
          <button id="closeModalBtn" class="w-full bg-[#7B2FBE] hover:bg-[#62219c] text-white py-3 rounded-xl font-semibold shadow-lg shadow-purple-600/10 active:scale-[0.98]">Instalar Aplicación</button>
          <button id="laterBtn" class="w-full py-2.5 text-sm text-gray-400 hover:text-gray-600 font-medium tracking-wide">Más tarde</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ================================================================
    // CONFIGURACIÓN - REEMPLAZA CON LA URL DE TU WEB APP
    // ================================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbxWJgO0AuaDH_8b9Gx8lGwyLyWU2GBcFlyVib4A6kAd4cyqGeoNCR18JEOwFpIsiPrL-g/exec';

    let currentView = 'login';
    let currentUserEmail = null;
    let currentUserName = '';
    let currentOpticaId = null;  // 🔑 Almacena el ID de la óptica para redirecciones
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    function triggerPWAInstall() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome !== 'accepted') mostrarInstruccionesInstalacion();
          deferredPrompt = null;
        });
      } else {
        mostrarInstruccionesInstalacion();
      }
    }

    function mostrarInstruccionesInstalacion() {
      alert('Para instalar la app:\n• Android: Opciones (⋮) → "Instalar aplicación"\n• iOS: Compartir → "Añadir a pantalla de inicio"');
    }

    // ================================================================
    // API - Comunicación con el servidor
    // ================================================================
    async function apiRequest(action, params = {}, showSkeleton = false) {
      if (showSkeleton) mostrarSkeleton(true);
      try {
        const query = new URLSearchParams({ action, ...params }).toString();
        const response = await fetch(`${API_URL}?${query}`, { method: 'GET', mode: 'cors' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (err) {
        throw new Error('No se pudo establecer comunicación estable con el servidor.');
      } finally {
        if (showSkeleton) mostrarSkeleton(false);
      }
    }

    function mostrarSkeleton(mostrar) {
      let skeleton = document.getElementById('skeletonOverlay');
      if (mostrar) {
        if (!skeleton) {
          skeleton = document.createElement('div');
          skeleton.id = 'skeletonOverlay';
          skeleton.className = 'fixed inset-0 bg-neutral-800/40 backdrop-blur-md flex items-center justify-center z-50';
          skeleton.innerHTML = '<div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100 flex flex-col items-center gap-3"><div class="w-10 h-10 border-[3.5px] border-[#7B2FBE] border-t-transparent rounded-full animate-spin"></div><p class="text-[#424242] font-semibold text-sm">Cargando...</p></div>';
          document.body.appendChild(skeleton);
        }
        skeleton.classList.remove('hidden');
      } else if (skeleton) skeleton.classList.add('hidden');
    }

    // ================================================================
    // FUNCIONES DE NAVEGACIÓN MULTI-TENANT
    // ================================================================
    function redirectToDashboard(opticaId) {
      if (!opticaId) {
        console.error('No se puede redirigir: falta id_optica');
        return;
      }
      window.location.href = `dashboard.html?cliente=${opticaId}`;
    }

    function redirectToPlans(opticaId) {
      if (!opticaId) {
        console.error('No se puede redirigir: falta id_optica');
        return;
      }
      // Guardamos el ID para usarlo después de la selección del plan
      currentOpticaId = opticaId;
      // Mostramos la vista de planes (ya tenemos el ID en currentOpticaId)
      currentView = 'plans';
      renderApp();
    }

    // ================================================================
    // AUTO-LOGIN DESPUÉS DE REGISTRO
    // ================================================================
    async function autoLoginAfterRegister(correo, password, nombreDoctor, opticaId) {
      try {
        const result = await apiRequest('login', { correo, password }, true);
        if (!result.success) { 
          currentView = 'login'; 
          renderApp(); 
          return; 
        }
        if (result.rol === 'admin') { 
          window.location.href = 'admin_panel.html'; 
          return; 
        }
        currentUserEmail = correo;
        currentUserName = nombreDoctor || result.doctor || 'Especialista';
        // Usar el opticaId que nos pasaron (o el que vino en la respuesta)
        const idOptica = opticaId || result.idOptica;
        if (idOptica) {
          currentOpticaId = idOptica;
          // Verificar si ya tiene plan seleccionado
          const planSeleccionado = result.planSeleccionado;
          const estadoPlan = result.estadoPlan;
          if (!planSeleccionado || estadoPlan === 'inactivo') {
            // Ir a selección de planes
            currentView = 'plans';
            renderApp();
          } else if (estadoPlan === 'pendiente_aprobacion') {
            currentView = 'pending';
            renderApp();
          } else if (estadoPlan === 'activo') {
            redirectToDashboard(idOptica);
          } else if (estadoPlan === 'rechazado') {
            currentView = 'rejected';
            renderApp();
          } else {
            currentView = 'plans';
            renderApp();
          }
        } else {
          // Fallback: si no hay idOptica, ir a planes (solo para casos extremos)
          currentView = 'plans';
          renderApp();
        }
      } catch (err) {
        currentView = 'login';
        renderApp();
      }
    }

    // ================================================================
    // RENDERS DE VISTAS
    // ================================================================
    function renderLogin() {
      return `
        <div class="animate-fade-up">
          <h2 class="text-2xl font-bold text-[#424242] tracking-tight">🔐 Bienvenido de nuevo</h2>
          <p class="text-gray-400 text-sm mt-1 mb-6">Ingresa al portal administrativo con tus accesos</p>
          <div class="space-y-4">
            <div>
              <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Correo electrónico</label>
              <input type="email" id="loginEmail" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-[#424242] bg-gray-50/50 focus:bg-white" placeholder="ejemplo@opticagm.com">
            </div>
            <div>
              <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Contraseña</label>
              <div class="relative">
                <input type="password" id="loginPassword" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-[#424242] bg-gray-50/50 focus:bg-white pr-10" placeholder="Ingresa tu clave de acceso">
                <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                  <span class="material-symbols-outlined text-xl">visibility_off</span>
                </button>
              </div>
            </div>
            <button id="doLoginBtn" class="w-full bg-[#7B2FBE] hover:bg-[#62219c] text-white py-3.5 rounded-xl font-semibold flex items-center justify-center gap-2 shadow-lg shadow-purple-600/10 mt-2 active:scale-[0.99]">
              <span class="material-symbols-outlined text-lg">login</span> Acceder al Sistema
            </button>
            <div class="border-t border-gray-100 my-6 pt-5 text-center">
              <p class="text-sm text-gray-500">¿Aún no tienes una sucursal activa? <button id="goToRegister" class="text-[#0288D1] font-bold hover:underline ml-0.5">Regístrate aquí</button></p>
            </div>
          </div>
        </div>
      `;
    }

    function renderRegister() {
      return `
        <div class="animate-fade-up">
          <h2 class="text-2xl font-bold text-[#424242] tracking-tight">📝 Registro de Sucursal</h2>
          <p class="text-gray-400 text-sm mt-1 mb-5">Completa los datos técnicos de tu óptica</p>
          <div class="space-y-4 max-h-[380px] overflow-y-auto pr-2 custom-scroll">
            <div>
              <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Nombre de la Óptica *</label>
              <input id="regOptica" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-[#424242] bg-gray-50/50 focus:bg-white" placeholder="Ej: Ópticas GM Centro">
            </div>
            <div>
              <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Nombre del Especialista / Doctor *</label>
              <input id="regDoctor" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-[#424242] bg-gray-50/50 focus:bg-white" placeholder="Ej: Dr. Alejandro Gómez">
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Ciudad *</label>
                <input id="regCiudad" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-[#424242] bg-gray-50/50 focus:bg-white" placeholder="Quito">
              </div>
              <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">RUC / Cédula</label>
                <input id="regRuc" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-[#424242] bg-gray-50/50 focus:bg-white" placeholder="1790012345001">
              </div>
            </div>
            <div>
              <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Dirección de la sucursal</label>
              <input id="regDireccion" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-[#424242] bg-gray-50/50 focus:bg-white" placeholder="Av. Amazonas y NNUU">
            </div>
            <div>
              <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">WhatsApp de Contacto</label>
              <input id="regTelefono" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-[#424242] bg-gray-50/50 focus:bg-white" placeholder="0999123456">
            </div>
            <div>
              <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Correo electrónico institucional *</label>
              <input type="email" id="regCorreo" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-[#424242] bg-gray-50/50 focus:bg-white" placeholder="contacto@opticagm.com">
            </div>
            <div>
              <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Contraseña del sistema *</label>
              <div class="relative">
                <input type="password" id="regPassword" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-[#424242] bg-gray-50/50 focus:bg-white pr-10" placeholder="Mínimo 6 caracteres">
                <button type="button" id="toggleRegPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                  <span class="material-symbols-outlined text-xl">visibility_off</span>
                </button>
              </div>
            </div>
          </div>
          <div class="mt-5 space-y-4">
            <button id="doRegisterBtn" class="w-full bg-[#7B2FBE] hover:bg-[#62219c] text-white py-3.5 rounded-xl font-semibold flex items-center justify-center gap-2 shadow-lg shadow-purple-600/10 active:scale-[0.99]">
              <span class="material-symbols-outlined text-lg">how_to_reg</span> Finalizar Registro
            </button>
            <p class="text-center text-sm text-slate-500">¿Ya posees una cuenta? <button id="goToLogin" class="text-[#0288D1] font-bold hover:underline ml-0.5">Inicia sesión</button></p>
          </div>
        </div>
      `;
    }

    function renderPlans() {
      return `
        <div class="animate-fade-up">
          <h2 class="text-2xl font-bold text-[#424242] tracking-tight">💎 Selecciona tu Plan</h2>
          <p class="text-sm text-gray-400 mt-1 mb-5">Activa las herramientas profesionales para tu óptica</p>
          
          <div id="planContainer" class="space-y-3.5">
            <div data-plan="gratis" class="plan-card border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center cursor-pointer hover:bg-green-50/30 hover:border-[#2E7D32]/50 group">
              <div>
                <span class="font-bold text-[#424242] group-hover:text-[#2E7D32] text-base block">Plan Prueba</span>
                <div class="text-xs text-gray-400 font-medium">7 días de evaluación completa</div>
              </div>
              <span class="text-[#2E7D32] font-bold text-sm bg-green-50 border border-green-100 px-3 py-1.5 rounded-xl">Acceso Gratis</span>
            </div>
            <div data-plan="mensual" class="plan-card border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center cursor-pointer hover:bg-blue-50/30 hover:border-[#0288D1]/50 group">
              <div>
                <span class="font-bold text-[#424242] group-hover:text-[#0288D1] text-base block">Suscripción Mensual</span>
                <div class="text-xs text-gray-400 font-medium">Pago mes a mes flexible</div>
              </div>
              <span class="text-[#0288D1] font-extrabold text-lg bg-blue-50 border border-blue-100 px-3 py-1.5 rounded-xl">$20<span class="text-[10px] font-medium text-gray-400">/mes</span></span>
            </div>
            <div data-plan="semestral" class="plan-card border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center cursor-pointer hover:bg-purple-50/30 hover:border-[#7B2FBE]/50 group">
              <div>
                <span class="font-bold text-[#424242] group-hover:text-[#7B2FBE] text-base block">Suscripción Semestral</span>
                <div class="text-xs text-[#0288D1] font-semibold bg-blue-50 rounded px-1.5 py-0.5 inline-block mt-0.5">Ahorras $10 en total</div>
              </div>
              <span class="text-[#7B2FBE] font-extrabold text-lg bg-purple-50 border border-purple-100 px-3 py-1.5 rounded-xl">$110</span>
            </div>
            <div data-plan="anual" class="plan-card border-2 border-purple-500/30 bg-purple-50/10 rounded-2xl p-4 flex justify-between items-center cursor-pointer hover:border-[#7B2FBE] transition-all group relative">
              <div class="absolute -top-2.5 right-5 bg-orange-500 text-white text-[10px] font-bold tracking-wider px-2.5 py-0.5 rounded-full shadow-md uppercase">Mejor Valor 🔥</div>
              <div>
                <span class="font-bold text-[#424242] group-hover:text-[#7B2FBE] text-base block">Suscripción Anual</span>
                <div class="text-xs text-[#2E7D32] font-semibold mt-0.5">Ahorras $40 al año</div>
              </div>
              <span class="text-[#7B2FBE] font-extrabold text-lg bg-white border border-purple-200 px-3 py-1.5 rounded-xl shadow-sm">$200</span>
            </div>
          </div>
          
          <div id="mensajePlan" class="mt-5 p-4 rounded-xl text-center text-sm hidden font-medium"></div>
          <button id="volverLoginPlan" class="mt-5 text-xs text-gray-400 hover:text-[#7B2FBE] hover:underline font-semibold mx-auto block uppercase tracking-wider">← Cancelar y salir</button>
        </div>
      `;
    }

    function renderPending() {
      return `
        <div class="text-center p-4 animate-fade-up">
          <div class="w-14 h-14 bg-amber-50 rounded-2xl border border-amber-100 flex items-center justify-center mx-auto mb-4">
            <span class="material-symbols-outlined text-3xl text-amber-500 animate-pulse">hourglass_empty</span>
          </div>
          <h2 class="text-xl font-bold text-[#424242] tracking-tight">Verificación en Proceso</h2>
          <p class="text-gray-500 mt-2 text-sm leading-relaxed">Tu solicitud de activación de plan se encuentra <strong>pendiente de aprobación</strong> por el equipo administrativo. Se te notificará una vez autorizado.</p>
          <button id="volverLoginPending" class="mt-6 w-full bg-gray-100 hover:bg-gray-200 text-[#424242] py-3 rounded-xl font-semibold text-sm">Regresar al Inicio</button>
        </div>
      `;
    }

    function renderRejected() {
      return `
        <div class="text-center p-4 animate-fade-up">
          <div class="w-14 h-14 bg-rose-50 rounded-2xl border border-rose-100 flex items-center justify-center mx-auto mb-4">
            <span class="material-symbols-outlined text-3xl text-rose-500">cancel</span>
          </div>
          <h2 class="text-xl font-bold text-[#424242] tracking-tight">Cuenta Inactiva / Rechazada</h2>
          <p class="text-gray-500 mt-2 text-sm leading-relaxed">No hemos podido validar tu suscripción. Por favor ponte en contacto directo con nuestra mesa de ayuda para resolverlo.</p>
          <div class="mt-6 space-y-2">
            <button id="contactarSoporte" class="w-full bg-[#2E7D32] hover:bg-[#1e5221] text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2 shadow-md shadow-green-600/10">
              <span class="material-symbols-outlined text-lg">chat</span> Soporte por WhatsApp
            </button>
            <button id="volverLoginRejected" class="w-full py-2.5 text-xs text-gray-400 hover:text-gray-600 underline font-medium">Volver al Login</button>
          </div>
        </div>
      `;
    }

    function showThankYouModal() {
      const modal = document.getElementById('thankyouModal');
      modal.style.display = 'flex';
      document.getElementById('closeModalBtn').onclick = () => {
        modal.style.display = 'none';
        triggerPWAInstall();
        // Después de cerrar, redirigir al dashboard con el idOptica
        if (currentOpticaId) {
          setTimeout(() => redirectToDashboard(currentOpticaId), 500);
        } else {
          setTimeout(() => { currentView = 'login'; renderApp(); }, 500);
        }
      };
      document.getElementById('laterBtn').onclick = () => {
        modal.style.display = 'none';
        if (currentOpticaId) {
          setTimeout(() => redirectToDashboard(currentOpticaId), 500);
        } else {
          setTimeout(() => { currentView = 'login'; renderApp(); }, 500);
        }
      };
    }

    // ================================================================
    // MANEJO DE LOGIN
    // ================================================================
    async function handleLogin(correo, password) {
      try {
        const result = await apiRequest('login', { correo, password }, true);
        if (!result.success) {
          alert('⚠️ ' + (result.error || 'Credenciales de acceso incorrectas.'));
          return;
        }
        if (result.rol === 'admin') { 
          window.location.href = 'admin_panel.html'; 
          return; 
        }
        currentUserEmail = correo;
        currentUserName = result.doctor || 'Especialista';
        const planSeleccionado = result.planSeleccionado;
        const estadoPlan = result.estadoPlan;
        const idOptica = result.idOptica;

        if (!idOptica) {
          alert('⚠️ No se pudo identificar la óptica. Contacta al soporte.');
          return;
        }

        currentOpticaId = idOptica;

        if (!planSeleccionado || estadoPlan === 'inactivo') {
          currentView = 'plans';
          renderApp();
        } else if (estadoPlan === 'pendiente_aprobacion') {
          currentView = 'pending';
          renderApp();
        } else if (estadoPlan === 'activo') {
          redirectToDashboard(idOptica);
        } else if (estadoPlan === 'rechazado') {
          currentView = 'rejected';
          renderApp();
        } else {
          currentView = 'plans';
          renderApp();
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // ================================================================
    // EVENTOS
    // ================================================================
    function attachEvents() {
      const toggle = document.getElementById('togglePassword');
      const pwdField = document.getElementById('loginPassword');
      if (toggle && pwdField) {
        toggle.onclick = () => {
          const type = pwdField.type === 'password' ? 'text' : 'password';
          pwdField.type = type;
          toggle.querySelector('span').innerText = type === 'password' ? 'visibility_off' : 'visibility';
        };
      }

      if (currentView === 'login') {
        document.getElementById('doLoginBtn')?.addEventListener('click', async () => {
          const correo = document.getElementById('loginEmail').value.trim();
          const pwd = document.getElementById('loginPassword').value;
          if (!correo || !pwd) { alert('❌ Por favor, ingresa tu correo y contraseña.'); return; }
          await handleLogin(correo, pwd);
        });
        document.getElementById('goToRegister')?.addEventListener('click', () => { currentView = 'register'; renderApp(); });
      }
      else if (currentView === 'register') {
        const toggleReg = document.getElementById('toggleRegPassword');
        const regPwd = document.getElementById('regPassword');
        if (toggleReg && regPwd) {
          toggleReg.onclick = () => {
            const type = regPwd.type === 'password' ? 'text' : 'password';
            regPwd.type = type;
            toggleReg.querySelector('span').innerText = type === 'password' ? 'visibility_off' : 'visibility';
          };
        }
        const regBtn = document.getElementById('doRegisterBtn');
        regBtn?.addEventListener('click', async () => {
          const nombre = document.getElementById('regOptica').value.trim();
          const doctor = document.getElementById('regDoctor').value.trim();
          const ciudad = document.getElementById('regCiudad').value.trim();
          const ruc = document.getElementById('regRuc').value.trim();
          const direccion = document.getElementById('regDireccion').value.trim();
          const telefono = document.getElementById('regTelefono').value.trim();
          const correo = document.getElementById('regCorreo').value.trim();
          const password = document.getElementById('regPassword').value;
          if (!nombre || !doctor || !ciudad || !correo || !password) { 
            alert('❌ Debes rellenar todos los campos marcados como obligatorios (*)'); 
            return; 
          }
          const result = await apiRequest('register', { 
            nombre, doctor, ciudad, ruc, direccion, telefono, correo, password 
          }, true);
          if (result.success) {
            const idOptica = result.idOptica;
            if (idOptica) {
              // Guardar el ID para futuras redirecciones
              currentOpticaId = idOptica;
              // Auto-login con el nuevo ID
              await autoLoginAfterRegister(correo, password, doctor, idOptica);
            } else {
              alert('⚠️ Registro exitoso, pero no se pudo obtener el ID de la óptica.');
              currentView = 'login';
              renderApp();
            }
          } else {
            alert('❌ Error de registro: ' + (result.error || 'No se pudo procesar la solicitud.'));
          }
        });
        document.getElementById('goToLogin')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
      }
      else if (currentView === 'plans') {
        const cards = document.querySelectorAll('[data-plan]');
        let enviado = false;
        document.getElementById('volverLoginPlan')?.addEventListener('click', () => { 
          currentView = 'login'; 
          renderApp(); 
        });
        cards.forEach(card => {
          card.addEventListener('click', async () => {
            if (enviado) { 
              alert('Ya has enviado una solicitud previamente. Por favor espera la validación de soporte.'); 
              return; 
            }
            const plan = card.getAttribute('data-plan');
            let monto = 0, dias = 0;
            if (plan === 'gratis') { monto = 0; dias = 7; }
            else if (plan === 'mensual') { monto = 20; dias = 30; }
            else if (plan === 'semestral') { monto = 110; dias = 180; }
            else if (plan === 'anual') { monto = 200; dias = 365; }
            if (!currentUserEmail) { alert('Error crítico de sesión. Por favor reingresa.'); return; }
            if (!currentOpticaId) {
              alert('Error: no se pudo identificar la óptica. Reingresa al sistema.');
              currentView = 'login';
              renderApp();
              return;
            }
            
            cards.forEach(c => c.style.pointerEvents = 'none');
            const msgDiv = document.getElementById('mensajePlan');
            msgDiv.classList.remove('hidden');
            msgDiv.className = "mt-5 p-4 rounded-xl text-center text-sm font-medium bg-purple-50 border border-purple-100";
            msgDiv.innerHTML = '<span class="text-[#7B2FBE] flex items-center justify-center gap-2"><div class="w-4 h-4 border-2 border-[#7B2FBE] border-t-transparent rounded-full animate-spin"></div> Procesando orden...</span>';
            
            try {
              const result = await apiRequest('savePlan', { 
                correo: currentUserEmail, 
                plan, 
                monto, 
                duracionDias: dias 
              });
              if (result.success) {
                enviado = true;
                msgDiv.className = "mt-5 p-4 rounded-xl text-center text-sm font-medium bg-green-50 border border-green-100";
                msgDiv.innerHTML = '<span class="text-[#2E7D32] flex items-center justify-center gap-2"><span class="material-symbols-outlined text-lg">check_circle</span> Solicitud enviada con éxito</span>';
                showThankYouModal();
              } else {
                throw new Error(result.error);
              }
            } catch (err) {
              alert('Error: ' + err.message);
              cards.forEach(c => c.style.pointerEvents = 'auto');
              msgDiv.classList.add('hidden');
            }
          });
        });
      }
      else if (currentView === 'pending') {
        document.getElementById('volverLoginPending')?.addEventListener('click', () => { 
          currentView = 'login'; 
          renderApp(); 
        });
      }
      else if (currentView === 'rejected') {
        document.getElementById('contactarSoporte')?.addEventListener('click', () => {
          window.open(`https://wa.me/593984016027?text=Mi%20solicitud%20de%20plan%20fue%20rechazada%20y%20requiero%20asistencia`, '_blank');
        });
        document.getElementById('volverLoginRejected')?.addEventListener('click', () => { 
          currentView = 'login'; 
          renderApp(); 
        });
      }
    }

    function renderApp() {
      let html = '';
      if (currentView === 'login') html = renderLogin();
      else if (currentView === 'register') html = renderRegister();
      else if (currentView === 'plans') html = renderPlans();
      else if (currentView === 'pending') html = renderPending();
      else if (currentView === 'rejected') html = renderRejected();
      document.getElementById('appContent').innerHTML = html;
      attachEvents();
    }
    renderApp();

    // ================================================================
    // SERVICE WORKER
    // ================================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registrado', reg))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
