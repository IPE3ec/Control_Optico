<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Óptico - Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #f8fafc 0%, #e0e7ff 100%); }
    .skeleton { background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 antialiased">

  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden">
    <!-- Cabecera -->
    <div class="bg-gradient-to-br from-[#002d5e] to-[#0056b3] px-8 py-7 text-white">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-3xl">visibility</span>
        <div>
          <span class="font-extrabold text-2xl">Control Óptico</span>
          <p class="text-xs text-blue-100">Gestión profesional para ópticas</p>
        </div>
      </div>
    </div>

    <!-- Contenedor dinámico -->
    <div id="appContent" class="p-8"></div>
  </div>

  <script>
    // ========== CONFIGURACIÓN ==========
    const API_URL = 'https://script.google.com/macros/s/AKfycbwoQT8umdEJBCrOTqVuMUwlJ9ZIzJWXIYkQuyRtIPnZlisGmx3TtaM44tlTXT-fdQ8N/exec';
    const SOPORTE_WHATSAPP = '593984016027';

    let currentView = 'login';
    let currentUserEmail = null;
    let currentUserName = '';

    // ========== API ==========
    async function apiRequest(action, params = {}, showSkeleton = false) {
      if (showSkeleton) mostrarSkeleton(true);
      try {
        const query = new URLSearchParams({ action, ...params }).toString();
        const url = `${API_URL}?${query}`;
        const response = await fetch(url, { method: 'GET', mode: 'cors' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (err) {
        throw new Error('No se pudo conectar con el servidor.');
      } finally {
        if (showSkeleton) mostrarSkeleton(false);
      }
    }

    function mostrarSkeleton(mostrar) {
      let skeleton = document.getElementById('skeletonOverlay');
      if (mostrar) {
        if (!skeleton) {
          skeleton = document.createElement('div');
          skeleton.id = 'skeletonOverlay';
          skeleton.className = 'fixed inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-50';
          skeleton.innerHTML = '<div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center gap-3"><div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div><p class="text-gray-600 font-medium">Cargando...</p></div>';
          document.body.appendChild(skeleton);
        }
        skeleton.classList.remove('hidden');
      } else {
        if (skeleton) skeleton.classList.add('hidden');
      }
    }

    // Función para iniciar sesión automática después del registro
    async function autoLoginAfterRegister(correo, password, nombreDoctor) {
      try {
        const result = await apiRequest('login', { correo, password }, true);
        if (!result.success) {
          alert('⚠️ No se pudo iniciar sesión automáticamente. Por favor, inicia sesión manualmente.');
          currentView = 'login';
          renderApp();
          return;
        }
        if (result.rol === 'admin') {
          window.location.href = 'admin_panel.html';
          return;
        }
        currentUserEmail = correo;
        currentUserName = nombreDoctor || result.doctor || 'Especialista';
        const planSeleccionado = result.planSeleccionado;
        const estadoPlan = result.estadoPlan;

        if (!planSeleccionado || estadoPlan === 'inactivo') {
          // Mostrar pantalla de planes con mensaje de agradecimiento
          currentView = 'plans';
          renderApp();
          // Mostrar mensaje flotante de agradecimiento (se mostrará en la pantalla de planes)
          setTimeout(() => {
            const msgDiv = document.getElementById('mensajePlan');
            if (msgDiv) {
              msgDiv.classList.remove('hidden');
              msgDiv.innerHTML = '<div class="bg-green-50 border border-green-200 rounded-xl p-3 text-green-700 text-sm">🎉 ¡Gracias por registrarte! Tu cuenta está en revisión. Elige un plan y nuestro soporte lo validará pronto.</div>';
            }
          }, 100);
        } else if (estadoPlan === 'pendiente_aprobacion') {
          currentView = 'pending';
          renderApp();
        } else if (estadoPlan === 'activo') {
          window.location.href = 'dashboard.html';
        } else if (estadoPlan === 'rechazado') {
          currentView = 'rejected';
          renderApp();
        } else {
          currentView = 'plans';
          renderApp();
        }
      } catch (err) {
        alert('🚫 Error al iniciar sesión: ' + err.message);
        currentView = 'login';
        renderApp();
      }
    }

    // ========== RENDER VISTAS ==========
    function renderLogin() {
      return `
        <div>
          <h2 class="text-2xl font-bold text-gray-800">🔐 Iniciar sesión</h2>
          <p class="text-gray-500 text-sm mt-1 mb-6">Ingresa tus credenciales</p>
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Correo electrónico</label>
              <input type="email" id="loginEmail" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-2 focus:ring-blue-100 outline-none" placeholder="ejemplo@opticagm.com">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Contraseña</label>
              <div class="relative">
                <input type="password" id="loginPassword" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-2 focus:ring-blue-100 outline-none pr-10" placeholder="Ingresa tu contraseña">
                <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                  <span class="material-symbols-outlined text-lg">visibility_off</span>
                </button>
              </div>
            </div>
            <button id="doLoginBtn" class="w-full bg-[#003f87] hover:bg-[#002d5e] text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2 transition">
              <span class="material-symbols-outlined text-lg">login</span> Ingresar
            </button>
            <div class="border-t border-gray-100 my-6 pt-4 text-center">
              <p class="text-sm text-gray-500">¿No tienes cuenta? <button id="goToRegister" class="text-[#003f87] font-bold hover:underline">Regístrate aquí</button></p>
            </div>
          </div>
        </div>
      `;
    }

    function renderRegister() {
      return `
        <div>
          <h2 class="text-2xl font-bold text-gray-800">📝 Registro</h2>
          <p class="text-gray-500 text-sm mt-1 mb-4">Completa los datos de tu óptica</p>
          <div class="space-y-3 max-h-[420px] overflow-y-auto pr-1">
            <input id="regOptica" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="Nombre de la Óptica *">
            <input id="regDoctor" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="Nombre del Doctor *">
            <div class="grid grid-cols-2 gap-3">
              <input id="regCiudad" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="Ciudad *">
              <input id="regRuc" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="RUC / ID">
            </div>
            <input id="regDireccion" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="Dirección">
            <input id="regTelefono" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="Teléfono / WhatsApp">
            <input type="email" id="regCorreo" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="Correo electrónico *">
            <div class="relative">
              <input type="password" id="regPassword" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm pr-10" placeholder="Contraseña *">
              <button type="button" id="toggleRegPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400">
                <span class="material-symbols-outlined text-lg">visibility_off</span>
              </button>
            </div>
          </div>
          <div class="mt-5 space-y-4">
            <button id="doRegisterBtn" class="w-full bg-[#003f87] hover:bg-[#002d5e] text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2">
              <span class="material-symbols-outlined text-lg">how_to_reg</span> Finalizar Registro
            </button>
            <p class="text-center text-sm text-gray-500">¿Ya tienes cuenta? <button id="goToLogin" class="text-[#003f87] font-bold hover:underline">Inicia sesión</button></p>
          </div>
        </div>
      `;
    }

    function renderPlans() {
      return `
        <div>
          <h2 class="text-2xl font-bold text-gray-800">💎 Elige tu plan</h2>
          <p class="text-sm text-gray-500 mb-5">Selecciona la suscripción para tu óptica</p>
          <div id="planContainer" class="space-y-3">
            <div data-plan="gratis" class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between cursor-pointer hover:bg-blue-50/30">
              <div><span class="font-bold">Plan Gratis</span><div class="text-xs text-gray-400">7 días de prueba</div></div>
              <span class="text-emerald-600 font-extrabold">Gratis</span>
            </div>
            <div data-plan="mensual" class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between cursor-pointer hover:bg-blue-50/30">
              <div><span class="font-bold">Plan Mensual</span><div class="text-xs text-gray-400">$20/mes</div></div>
              <span class="text-[#003f87] font-extrabold">$20</span>
            </div>
            <div data-plan="semestral" class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between cursor-pointer hover:bg-blue-50/30">
              <div><span class="font-bold">Plan Semestral</span><div class="text-xs text-blue-600">Ahorra $10</div></div>
              <span class="text-[#003f87] font-extrabold">$110</span>
            </div>
            <div data-plan="anual" class="border-2 border-blue-500/30 bg-blue-50/10 rounded-2xl p-4 flex justify-between cursor-pointer relative">
              <div class="absolute -top-2.5 right-4 bg-orange-500 text-white text-[10px] font-extrabold px-2 py-0.5 rounded-full">Mejor Valor</div>
              <div><span class="font-bold">Plan Anual</span><div class="text-xs text-emerald-600">Ahorra $40 🔥</div></div>
              <span class="text-[#003f87] font-extrabold">$200</span>
            </div>
          </div>
          <div id="mensajePlan" class="mt-5 p-4 rounded-xl text-center text-sm hidden bg-gray-50"></div>
          <button id="volverLoginPlan" class="mt-4 text-sm text-gray-500 hover:underline mx-auto block">← Volver al inicio</button>
        </div>
      `;
    }

    function renderPending() {
      return `
        <div class="text-center">
          <span class="material-symbols-outlined text-5xl text-amber-500 mb-3">hourglass_empty</span>
          <h2 class="text-xl font-bold text-gray-800">Solicitud enviada</h2>
          <p class="text-gray-500 mt-2">Tu plan está <strong>pendiente de aprobación</strong>. Te avisaremos cuando esté activo.</p>
          <button id="volverLoginPending" class="mt-6 bg-[#003f87] text-white px-6 py-2 rounded-xl">Volver al inicio</button>
        </div>
      `;
    }

    function renderRejected() {
      return `
        <div class="text-center">
          <span class="material-symbols-outlined text-5xl text-red-500 mb-3">cancel</span>
          <h2 class="text-xl font-bold text-gray-800">Plan rechazado</h2>
          <p class="text-gray-500 mt-2">Comunícate con soporte para regularizar tu situación.</p>
          <button id="contactarSoporte" class="mt-6 bg-green-600 text-white px-6 py-2 rounded-xl">WhatsApp</button>
          <button id="volverLoginRejected" class="mt-3 text-sm text-gray-500 underline block mx-auto">Volver al login</button>
        </div>
      `;
    }

    // ========== LÓGICA PRINCIPAL ==========
    async function handleLogin(correo, password, btn) {
      try {
        const result = await apiRequest('login', { correo, password }, true);
        if (!result.success) {
          alert('⚠️ ' + (result.error || 'Credenciales incorrectas'));
          return;
        }
        if (result.rol === 'admin') {
          window.location.href = 'admin_panel.html';
          return;
        }
        currentUserEmail = correo;
        currentUserName = result.doctor || 'Especialista';
        const planSeleccionado = result.planSeleccionado;
        const estadoPlan = result.estadoPlan;

        if (!planSeleccionado || estadoPlan === 'inactivo') {
          currentView = 'plans';
          renderApp();
        } else if (estadoPlan === 'pendiente_aprobacion') {
          currentView = 'pending';
          renderApp();
        } else if (estadoPlan === 'activo') {
          window.location.href = 'dashboard.html';
        } else if (estadoPlan === 'rechazado') {
          currentView = 'rejected';
          renderApp();
        } else {
          currentView = 'plans';
          renderApp();
        }
      } catch (err) {
        alert('🚫 Error: ' + err.message);
      }
    }

    function attachEvents() {
      // Toggle password visibility en login
      const togglePassword = document.getElementById('togglePassword');
      const pwdField = document.getElementById('loginPassword');
      if (togglePassword && pwdField) {
        togglePassword.addEventListener('click', () => {
          const type = pwdField.type === 'password' ? 'text' : 'password';
          pwdField.type = type;
          togglePassword.querySelector('span').innerText = type === 'password' ? 'visibility_off' : 'visibility';
        });
      }

      if (currentView === 'login') {
        const loginBtn = document.getElementById('doLoginBtn');
        loginBtn?.addEventListener('click', async () => {
          const correo = document.getElementById('loginEmail').value.trim();
          const pwd = document.getElementById('loginPassword').value;
          if (!correo || !pwd) { alert('❌ Ingresa correo y contraseña'); return; }
          await handleLogin(correo, pwd, loginBtn);
        });
        document.getElementById('goToRegister')?.addEventListener('click', () => { currentView = 'register'; renderApp(); });
      }
      else if (currentView === 'register') {
        // Toggle password en registro
        const toggleReg = document.getElementById('toggleRegPassword');
        const regPwd = document.getElementById('regPassword');
        if (toggleReg && regPwd) {
          toggleReg.addEventListener('click', () => {
            const type = regPwd.type === 'password' ? 'text' : 'password';
            regPwd.type = type;
            toggleReg.querySelector('span').innerText = type === 'password' ? 'visibility_off' : 'visibility';
          });
        }
        const regBtn = document.getElementById('doRegisterBtn');
        regBtn?.addEventListener('click', async () => {
          const nombre = document.getElementById('regOptica').value.trim();
          const doctor = document.getElementById('regDoctor').value.trim();
          const ciudad = document.getElementById('regCiudad').value.trim();
          const ruc = document.getElementById('regRuc').value.trim();
          const direccion = document.getElementById('regDireccion').value.trim();
          const telefono = document.getElementById('regTelefono').value.trim();
          const correo = document.getElementById('regCorreo').value.trim();
          const password = document.getElementById('regPassword').value;
          if (!nombre || !doctor || !ciudad || !correo || !password) {
            alert('❌ Completa los campos obligatorios (*)'); return;
          }
          try {
            const result = await apiRequest('register', { nombre, doctor, ciudad, ruc, direccion, telefono, correo, password }, true);
            if (result.success) {
              // Mostrar mensaje de agradecimiento
              alert('🎉 ¡Gracias por registrarte! Tu cuenta ha sido creada. Ahora serás redirigido para elegir tu plan. Nuestro soporte técnico validará tu información pronto.');
              // Iniciar sesión automáticamente
              await autoLoginAfterRegister(correo, password, doctor);
            } else {
              alert('❌ Error: ' + (result.error || 'No se pudo registrar'));
            }
          } catch (err) { alert('Error: ' + err.message); }
        });
        document.getElementById('goToLogin')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
      }
      else if (currentView === 'plans') {
        const cards = document.querySelectorAll('[data-plan]');
        const msgDiv = document.getElementById('mensajePlan');
        let enviado = false;
        document.getElementById('volverLoginPlan')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
        cards.forEach(card => {
          card.addEventListener('click', async () => {
            if (enviado) { alert('Ya enviaste una solicitud. Espera aprobación.'); return; }
            const plan = card.getAttribute('data-plan');
            let monto = 0, dias = 0;
            if (plan === 'gratis') { monto = 0; dias = 7; }
            else if (plan === 'mensual') { monto = 20; dias = 30; }
            else if (plan === 'semestral') { monto = 110; dias = 180; }
            else if (plan === 'anual') { monto = 200; dias = 365; }
            if (!currentUserEmail) { alert('Error: usuario no identificado'); return; }
            cards.forEach(c => c.style.pointerEvents = 'none');
            msgDiv.classList.remove('hidden');
            msgDiv.innerHTML = '<span class="text-blue-600">Enviando solicitud...</span>';
            try {
              const result = await apiRequest('savePlan', { correo: currentUserEmail, plan, monto, duracionDias: dias });
              if (result.success) {
                enviado = true;
                msgDiv.innerHTML = '<span class="text-green-600">✅ Solicitud enviada. Redirigiendo...</span>';
                const texto = `Hola, he seleccionado el plan ${plan.toUpperCase()} ($${monto})\nDoctor: ${currentUserName}\nCorreo: ${currentUserEmail}`;
                window.open(`https://wa.me/${SOPORTE_WHATSAPP}?text=${encodeURIComponent(texto)}`, '_blank');
                setTimeout(() => { currentView = 'login'; renderApp(); }, 3000);
              } else { throw new Error(result.error); }
            } catch (err) {
              alert('Error: ' + err.message);
              cards.forEach(c => c.style.pointerEvents = 'auto');
              msgDiv.classList.add('hidden');
            }
          });
        });
      }
      else if (currentView === 'pending') {
        document.getElementById('volverLoginPending')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
      }
      else if (currentView === 'rejected') {
        document.getElementById('contactarSoporte')?.addEventListener('click', () => {
          window.open(`https://wa.me/${SOPORTE_WHATSAPP}?text=Mi%20plan%20fue%20rechazado`, '_blank');
        });
        document.getElementById('volverLoginRejected')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
      }
    }

    function renderApp() {
      let html = '';
      if (currentView === 'login') html = renderLogin();
      else if (currentView === 'register') html = renderRegister();
      else if (currentView === 'plans') html = renderPlans();
      else if (currentView === 'pending') html = renderPending();
      else if (currentView === 'rejected') html = renderRejected();
      document.getElementById('appContent').innerHTML = html;
      attachEvents();
    }
    renderApp();
  </script>
</body>
</html>
