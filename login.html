<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Control Óptico - Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003f87">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #f8fafc 0%, #e0e7ff 100%); }
    .modal-backdrop { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-up { animation: fadeInUp 0.3s ease-out; }
    /* Mejoras en inputs */
    input, select, textarea { transition: all 0.2s ease; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #003f87; box-shadow: 0 0 0 3px rgba(0, 63, 135, 0.1); }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 antialiased">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-br from-[#002d5e] to-[#0056b3] px-8 py-7 text-white">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-3xl">visibility</span>
        <div><span class="font-extrabold text-2xl">Control Óptico</span><p class="text-xs text-blue-100">Gestión profesional para ópticas</p></div>
      </div>
    </div>
    <div id="appContent" class="p-8"></div>
  </div>

  <!-- Modal de agradecimiento e instalación PWA -->
  <div id="thankyouModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop" style="display: none;">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl animate-fade-up">
      <div class="text-center">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <span class="material-symbols-outlined text-4xl text-green-600">check_circle</span>
        </div>
        <h3 class="text-xl font-bold text-gray-800">¡Gracias por elegir tu plan!</h3>
        <p class="text-gray-500 mt-2 text-sm">Hemos recibido tu solicitud. Nuestro equipo de soporte validará tu cuenta próximamente.</p>
        <button id="closeModalBtn" class="mt-5 w-full bg-[#003f87] hover:bg-[#002d5e] text-white py-2.5 rounded-xl font-semibold transition">Instalar App</button>
        <button id="laterBtn" class="mt-2 text-sm text-gray-400 hover:text-gray-600 underline">Más tarde</button>
      </div>
    </div>
  </div>

  <script>
    // ========== CONFIGURACIÓN ==========
    const API_URL = 'https://script.google.com/macros/s/AKfycbwoQT8umdEJBCrOTqVuMUwlJ9ZIzJWXIYkQuyRtIPnZlisGmx3TtaM44tlTXT-fdQ8N/exec';
    let currentView = 'login';
    let currentUserEmail = null;
    let currentUserName = '';
    let deferredPrompt = null;

    // PWA: capturar evento de instalación
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log('PWA instalable detectada');
    });

    function triggerPWAInstall() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('PWA instalada');
          } else {
            mostrarInstruccionesInstalacion();
          }
          deferredPrompt = null;
        });
      } else {
        mostrarInstruccionesInstalacion();
      }
    }

    function mostrarInstruccionesInstalacion() {
      alert('Para instalar la app:\n• Android: ⋮ → "Instalar aplicación"\n• iOS: Compartir → "Añadir a pantalla de inicio"');
    }

    // ========== API ==========
    async function apiRequest(action, params = {}, showSkeleton = false) {
      if (showSkeleton) mostrarSkeleton(true);
      try {
        const query = new URLSearchParams({ action, ...params }).toString();
        const response = await fetch(`${API_URL}?${query}`, { method: 'GET', mode: 'cors' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (err) {
        throw new Error('No se pudo conectar con el servidor.');
      } finally {
        if (showSkeleton) mostrarSkeleton(false);
      }
    }

    function mostrarSkeleton(mostrar) {
      let skeleton = document.getElementById('skeletonOverlay');
      if (mostrar) {
        if (!skeleton) {
          skeleton = document.createElement('div');
          skeleton.id = 'skeletonOverlay';
          skeleton.className = 'fixed inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-50';
          skeleton.innerHTML = '<div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center gap-3"><div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div><p class="text-gray-600 font-medium">Cargando...</p></div>';
          document.body.appendChild(skeleton);
        }
        skeleton.classList.remove('hidden');
      } else if (skeleton) skeleton.classList.add('hidden');
    }

    // Auto login después de registro (sin alertas, directo a planes)
    async function autoLoginAfterRegister(correo, password, nombreDoctor) {
      try {
        const result = await apiRequest('login', { correo, password }, true);
        if (!result.success) {
          currentView = 'login';
          renderApp();
          return;
        }
        if (result.rol === 'admin') { window.location.href = 'admin_panel.html'; return; }
        currentUserEmail = correo;
        currentUserName = nombreDoctor || result.doctor || 'Especialista';
        // Forzar a ir a la pantalla de planes directamente
        currentView = 'plans';
        renderApp();
      } catch (err) {
        currentView = 'login';
        renderApp();
      }
    }

    // ========== VISTAS MEJORADAS ==========
    function renderLogin() {
      return `
        <div>
          <h2 class="text-2xl font-bold text-gray-800">🔐 Iniciar sesión</h2>
          <p class="text-gray-500 text-sm mt-1 mb-6">Ingresa tus credenciales</p>
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Correo electrónico</label>
              <input type="email" id="loginEmail" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-2 focus:ring-blue-100 outline-none" placeholder="ejemplo@opticagm.com">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Contraseña</label>
              <div class="relative">
                <input type="password" id="loginPassword" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-2 focus:ring-blue-100 outline-none pr-10" placeholder="Ingresa tu contraseña">
                <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                  <span class="material-symbols-outlined text-lg">visibility_off</span>
                </button>
              </div>
            </div>
            <button id="doLoginBtn" class="w-full bg-[#003f87] hover:bg-[#002d5e] text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2 transition">
              <span class="material-symbols-outlined text-lg">login</span> Ingresar
            </button>
            <div class="border-t border-gray-100 my-6 pt-4 text-center">
              <p class="text-sm text-gray-500">¿No tienes cuenta? <button id="goToRegister" class="text-[#003f87] font-bold hover:underline">Regístrate aquí</button></p>
            </div>
          </div>
        </div>
      `;
    }

    function renderRegister() {
      return `
        <div>
          <h2 class="text-2xl font-bold text-gray-800">📝 Registro</h2>
          <p class="text-gray-500 text-sm mt-1 mb-5">Completa los datos de tu óptica</p>
          <div class="space-y-4 max-h-[420px] overflow-y-auto pr-1 custom-scroll">
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Nombre de la Óptica *</label>
              <input id="regOptica" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Ej: Ópticas GM Centro">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Nombre del Doctor *</label>
              <input id="regDoctor" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Ej: Dr. Alejandro Gómez">
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Ciudad *</label>
                <input id="regCiudad" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Quito">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">RUC / ID</label>
                <input id="regRuc" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-2 focus:ring-blue-100 outline-none" placeholder="1790012345001">
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Dirección</label>
              <input id="regDireccion" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-2 focus:ring-blue-100 outline-none" placeholder="Av. Amazonas y NNUU">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Teléfono / WhatsApp</label>
              <input id="regTelefono" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-2 focus:ring-blue-100 outline-none" placeholder="0999123456">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Correo electrónico *</label>
              <input type="email" id="regCorreo" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-2 focus:ring-blue-100 outline-none" placeholder="contacto@opticagm.com">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Contraseña *</label>
              <div class="relative">
                <input type="password" id="regPassword" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-2 focus:ring-blue-100 outline-none pr-10" placeholder="Mínimo 6 caracteres">
                <button type="button" id="toggleRegPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                  <span class="material-symbols-outlined text-lg">visibility_off</span>
                </button>
              </div>
            </div>
          </div>
          <div class="mt-6 space-y-4">
            <button id="doRegisterBtn" class="w-full bg-[#003f87] hover:bg-[#002d5e] text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2 transition">
              <span class="material-symbols-outlined text-lg">how_to_reg</span> Finalizar Registro
            </button>
            <p class="text-center text-sm text-gray-500">¿Ya tienes cuenta? <button id="goToLogin" class="text-[#003f87] font-bold hover:underline">Inicia sesión</button></p>
          </div>
        </div>
      `;
    }

    function renderPlans() {
      return `
        <div>
          <h2 class="text-2xl font-bold text-gray-800">💎 Elige tu plan</h2>
          <p class="text-sm text-gray-500 mb-5">Selecciona la suscripción para tu óptica</p>
          <div id="planContainer" class="space-y-3">
            <div data-plan="gratis" class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center cursor-pointer hover:bg-blue-50/30 hover:border-blue-200 transition-all group">
              <div><span class="font-bold text-gray-800 group-hover:text-[#003f87]">Plan Gratis</span><div class="text-xs text-gray-400">7 días de prueba</div></div>
              <span class="text-emerald-600 font-extrabold text-xl bg-emerald-50 px-3 py-1 rounded-xl">Gratis</span>
            </div>
            <div data-plan="mensual" class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center cursor-pointer hover:bg-blue-50/30 hover:border-blue-200 transition-all group">
              <div><span class="font-bold text-gray-800 group-hover:text-[#003f87]">Plan Mensual</span><div class="text-xs text-gray-400">$20/mes</div></div>
              <span class="text-[#003f87] font-extrabold text-xl bg-blue-50 px-3 py-1 rounded-xl">$20</span>
            </div>
            <div data-plan="semestral" class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center cursor-pointer hover:bg-blue-50/30 hover:border-blue-200 transition-all group">
              <div><span class="font-bold text-gray-800 group-hover:text-[#003f87]">Plan Semestral</span><div class="text-xs text-blue-600 font-medium">Ahorra $10</div></div>
              <span class="text-[#003f87] font-extrabold text-xl bg-blue-50 px-3 py-1 rounded-xl">$110</span>
            </div>
            <div data-plan="anual" class="border-2 border-blue-500/30 bg-blue-50/10 rounded-2xl p-4 flex justify-between items-center cursor-pointer hover:bg-blue-50/30 hover:border-blue-400 transition-all group relative">
              <div class="absolute -top-2.5 right-4 bg-orange-500 text-white text-[10px] font-extrabold px-2.5 py-0.5 rounded-full">Mejor Valor</div>
              <div><span class="font-bold text-gray-800 group-hover:text-[#003f87]">Plan Anual</span><div class="text-xs text-emerald-600 font-medium">Ahorra $40 🔥</div></div>
              <span class="text-[#003f87] font-extrabold text-xl bg-blue-50 px-3 py-1 rounded-xl">$200</span>
            </div>
          </div>
          <div id="mensajePlan" class="mt-5 p-4 rounded-xl text-center text-sm hidden bg-gray-50 border border-gray-100"></div>
          <button id="volverLoginPlan" class="mt-4 text-sm text-gray-500 hover:text-[#003f87] underline mx-auto block transition">← Volver al inicio</button>
        </div>
      `;
    }

    function renderPending() {
      return `
        <div class="text-center">
          <span class="material-symbols-outlined text-5xl text-amber-500 mb-3">hourglass_empty</span>
          <h2 class="text-xl font-bold text-gray-800">Solicitud enviada</h2>
          <p class="text-gray-500 mt-2">Tu plan está <strong>pendiente de aprobación</strong>. Te avisaremos cuando esté activo.</p>
          <button id="volverLoginPending" class="mt-6 bg-[#003f87] hover:bg-[#002d5e] text-white px-6 py-2 rounded-xl transition">Volver al inicio</button>
        </div>
      `;
    }

    function renderRejected() {
      return `
        <div class="text-center">
          <span class="material-symbols-outlined text-5xl text-red-500 mb-3">cancel</span>
          <h2 class="text-xl font-bold text-gray-800">Plan rechazado</h2>
          <p class="text-gray-500 mt-2">Comunícate con soporte para regularizar tu situación.</p>
          <button id="contactarSoporte" class="mt-6 bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-xl transition">WhatsApp</button>
          <button id="volverLoginRejected" class="mt-3 text-sm text-gray-500 underline block mx-auto">Volver al login</button>
        </div>
      `;
    }

    // Modal de agradecimiento con opción de instalar PWA
    function showThankYouModal() {
      const modal = document.getElementById('thankyouModal');
      modal.style.display = 'flex';
      document.getElementById('closeModalBtn').onclick = () => {
        modal.style.display = 'none';
        triggerPWAInstall();
        setTimeout(() => { 
          currentView = 'login'; 
          renderApp(); 
        }, 500);
      };
      document.getElementById('laterBtn').onclick = () => {
        modal.style.display = 'none';
        setTimeout(() => { 
          currentView = 'login'; 
          renderApp(); 
        }, 500);
      };
    }

    async function handleLogin(correo, password) {
      try {
        const result = await apiRequest('login', { correo, password }, true);
        if (!result.success) {
          alert('⚠️ ' + (result.error || 'Credenciales incorrectas'));
          return;
        }
        if (result.rol === 'admin') { 
          window.location.href = 'admin_panel.html'; 
          return; 
        }
        currentUserEmail = correo;
        currentUserName = result.doctor || 'Especialista';
        const planSeleccionado = result.planSeleccionado;
        const estadoPlan = result.estadoPlan;

        if (!planSeleccionado || estadoPlan === 'inactivo') { 
          currentView = 'plans'; 
          renderApp(); 
        }
        else if (estadoPlan === 'pendiente_aprobacion') { 
          currentView = 'pending'; 
          renderApp(); 
        }
        else if (estadoPlan === 'activo') { 
          window.location.href = 'dashboard.html'; 
        }
        else if (estadoPlan === 'rechazado') { 
          currentView = 'rejected'; 
          renderApp(); 
        }
        else { 
          currentView = 'plans'; 
          renderApp(); 
        }
      } catch (err) { 
        alert('Error: ' + err.message); 
      }
    }

    function attachEvents() {
      // Toggle password en login
      const toggle = document.getElementById('togglePassword');
      const pwdField = document.getElementById('loginPassword');
      if (toggle && pwdField) {
        toggle.onclick = () => {
          const type = pwdField.type === 'password' ? 'text' : 'password';
          pwdField.type = type;
          toggle.querySelector('span').innerText = type === 'password' ? 'visibility_off' : 'visibility';
        };
      }

      if (currentView === 'login') {
        document.getElementById('doLoginBtn')?.addEventListener('click', async () => {
          const correo = document.getElementById('loginEmail').value.trim();
          const pwd = document.getElementById('loginPassword').value;
          if (!correo || !pwd) { alert('❌ Ingresa correo y contraseña'); return; }
          await handleLogin(correo, pwd);
        });
        document.getElementById('goToRegister')?.addEventListener('click', () => { currentView = 'register'; renderApp(); });
      }
      else if (currentView === 'register') {
        const toggleReg = document.getElementById('toggleRegPassword');
        const regPwd = document.getElementById('regPassword');
        if (toggleReg && regPwd) {
          toggleReg.onclick = () => {
            const type = regPwd.type === 'password' ? 'text' : 'password';
            regPwd.type = type;
            toggleReg.querySelector('span').innerText = type === 'password' ? 'visibility_off' : 'visibility';
          };
        }
        const regBtn = document.getElementById('doRegisterBtn');
        regBtn?.addEventListener('click', async () => {
          const nombre = document.getElementById('regOptica').value.trim();
          const doctor = document.getElementById('regDoctor').value.trim();
          const ciudad = document.getElementById('regCiudad').value.trim();
          const ruc = document.getElementById('regRuc').value.trim();
          const direccion = document.getElementById('regDireccion').value.trim();
          const telefono = document.getElementById('regTelefono').value.trim();
          const correo = document.getElementById('regCorreo').value.trim();
          const password = document.getElementById('regPassword').value;
          if (!nombre || !doctor || !ciudad || !correo || !password) { 
            alert('❌ Completa los campos obligatorios (*)'); 
            return; 
          }
          const result = await apiRequest('register', { nombre, doctor, ciudad, ruc, direccion, telefono, correo, password }, true);
          if (result.success) {
            // Sin alert, directo a auto-login y luego a planes
            await autoLoginAfterRegister(correo, password, doctor);
          } else {
            alert('❌ Error: ' + (result.error || 'No se pudo registrar'));
          }
        });
        document.getElementById('goToLogin')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
      }
      else if (currentView === 'plans') {
        const cards = document.querySelectorAll('[data-plan]');
        let enviado = false;
        document.getElementById('volverLoginPlan')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
        cards.forEach(card => {
          card.addEventListener('click', async () => {
            if (enviado) { 
              alert('Ya enviaste una solicitud. Espera aprobación.'); 
              return; 
            }
            const plan = card.getAttribute('data-plan');
            let monto = 0, dias = 0;
            if (plan === 'gratis') { monto = 0; dias = 7; }
            else if (plan === 'mensual') { monto = 20; dias = 30; }
            else if (plan === 'semestral') { monto = 110; dias = 180; }
            else if (plan === 'anual') { monto = 200; dias = 365; }
            if (!currentUserEmail) { 
              alert('Error de sesión'); 
              return; 
            }
            cards.forEach(c => c.style.pointerEvents = 'none');
            const msgDiv = document.getElementById('mensajePlan');
            msgDiv.classList.remove('hidden');
            msgDiv.innerHTML = '<span class="text-blue-600 flex items-center justify-center gap-2"><span class="material-symbols-outlined animate-spin">progress_activity</span> Procesando solicitud...</span>';
            
            try {
              const result = await apiRequest('savePlan', { correo: currentUserEmail, plan, monto, duracionDias: dias });
              if (result.success) {
                enviado = true;
                msgDiv.innerHTML = '<span class="text-green-600 flex items-center justify-center gap-2"><span class="material-symbols-outlined">check_circle</span> ¡Solicitud enviada correctamente!</span>';
                // Mostrar modal de agradecimiento e instalar PWA
                showThankYouModal();
              } else {
                throw new Error(result.error);
              }
            } catch (err) {
              alert('Error: ' + err.message);
              cards.forEach(c => c.style.pointerEvents = 'auto');
              msgDiv.classList.add('hidden');
            }
          });
        });
      }
      else if (currentView === 'pending') {
        document.getElementById('volverLoginPending')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
      }
      else if (currentView === 'rejected') {
        document.getElementById('contactarSoporte')?.addEventListener('click', () => {
          window.open(`https://wa.me/593984016027?text=Mi%20plan%20fue%20rechazado`, '_blank');
        });
        document.getElementById('volverLoginRejected')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
      }
    }

    function renderApp() {
      let html = '';
      if (currentView === 'login') html = renderLogin();
      else if (currentView === 'register') html = renderRegister();
      else if (currentView === 'plans') html = renderPlans();
      else if (currentView === 'pending') html = renderPending();
      else if (currentView === 'rejected') html = renderRejected();
      document.getElementById('appContent').innerHTML = html;
      attachEvents();
    }
    renderApp();

    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => console.log('SW registrado', reg)).catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
