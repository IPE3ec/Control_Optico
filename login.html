<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ontrol Óptico - Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f7f9ff; }
  </style>
</head>
<body class="bg-background flex items-center justify-center min-h-screen p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
    <div class="bg-primary px-6 py-4 text-white" style="background-color: #003f87;">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined">visibility</span>
        <span class="font-bold text-xl">ontrol Óptico </span>
      </div>
      <p class="text-sm opacity-90 mt-1">Accede o regístrate para continuar</p>
    </div>
    <div id="appContent" class="p-6"></div>
  </div>

  <script>
    // ================= URL DE TU WEB APP =================
    const API_URL = 'https://script.google.com/macros/s/AKfycbxNoEDimpF46CdTyknov4ZvRwt53x4DU1zR4OnxhaTnz8cJbES352kV-104hAd_Bscc/exec';

    let currentView = 'login'; // 'login', 'register', 'plans'
    let currentUserEmail = null;

    // ============= FUNCIÓN API =============
    async function apiRequest(action, params = {}) {
      const query = new URLSearchParams({ action, ...params }).toString();
      const url = `${API_URL}?${query}`;
      const response = await fetch(url, { method: 'GET', mode: 'cors' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return await response.json();
    }

    // ============= VISTAS =============
    function renderLogin() {
      return `
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Iniciar sesión</h2>
        <p class="text-gray-500 text-sm mb-6">Ingresa tus credenciales</p>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Correo electrónico</label>
            <input type="email" id="loginEmail" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="admin@opticasm.com">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Contraseña</label>
            <input type="password" id="loginPassword" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="••••••">
          </div>
          <button id="doLoginBtn" class="w-full bg-primary text-white py-2 rounded-lg font-semibold hover:bg-opacity-90" style="background-color:#003f87">Ingresar</button>
          <p class="text-center text-sm text-gray-500">¿No tienes cuenta? <button id="goToRegister" class="text-primary font-medium">Regístrate aquí</button></p>
        </div>
      `;
    }

    function renderRegister() {
      return `
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Registro de óptica</h2>
        <p class="text-gray-500 text-sm mb-4">Completa los datos para empezar</p>
        <div class="space-y-3 max-h-96 overflow-y-auto pr-1">
          <div><label class="block text-sm font-medium">Nombre del doctor / óptica</label><input id="regNombre" class="w-full border rounded-lg px-3 py-2"></div>
          <div><label class="block text-sm font-medium">Ciudad</label><input id="regCiudad" class="w-full border rounded-lg px-3 py-2"></div>
          <div><label class="block text-sm font-medium">RUC</label><input id="regRuc" class="w-full border rounded-lg px-3 py-2"></div>
          <div><label class="block text-sm font-medium">Dirección</label><input id="regDireccion" class="w-full border rounded-lg px-3 py-2"></div>
          <div><label class="block text-sm font-medium">Teléfono</label><input id="regTelefono" class="w-full border rounded-lg px-3 py-2"></div>
          <div><label class="block text-sm font-medium">Correo electrónico</label><input type="email" id="regCorreo" class="w-full border rounded-lg px-3 py-2"></div>
          <div><label class="block text-sm font-medium">Contraseña</label><input type="password" id="regPassword" class="w-full border rounded-lg px-3 py-2"></div>
          <button id="doRegisterBtn" class="w-full bg-primary text-white py-2 rounded-lg font-semibold" style="background-color:#003f87">Registrarse</button>
          <p class="text-center text-sm">¿Ya tienes cuenta? <button id="goToLogin" class="text-primary">Inicia sesión</button></p>
        </div>
      `;
    }

    function renderPlans() {
      return `
        <h2 class="text-2xl font-bold text-gray-800">Elige tu plan</h2>
        <p class="text-sm text-gray-500 mb-4">Selecciona la suscripción</p>
        <div class="space-y-3">
          <div class="border rounded-xl p-3 flex justify-between items-center hover:bg-gray-50 cursor-pointer" data-plan="gratis">
            <div><span class="font-bold">Plan Gratis</span><span class="text-xs block text-gray-500">7 días de prueba</span></div>
            <span class="text-green-600 font-bold">$0</span>
          </div>
          <div class="border rounded-xl p-3 flex justify-between items-center hover:bg-gray-50 cursor-pointer" data-plan="mensual">
            <div><span class="font-bold">Plan Mensual</span><span class="text-xs block text-gray-500">30 días</span></div>
            <span class="text-primary font-bold">$20</span>
          </div>
          <div class="border rounded-xl p-3 flex justify-between items-center hover:bg-gray-50 cursor-pointer" data-plan="semestral">
            <div><span class="font-bold">Plan Semestral</span><span class="text-xs block text-gray-500">6 meses (ahorro $10)</span></div>
            <span class="text-primary font-bold">$110</span>
          </div>
          <div class="border rounded-xl p-3 flex justify-between items-center hover:bg-gray-50 cursor-pointer" data-plan="anual">
            <div><span class="font-bold">Plan Anual</span><span class="text-xs block text-gray-500">12 meses (ahorro $40)</span></div>
            <span class="text-primary font-bold">$200</span>
          </div>
        </div>
        <div class="mt-6 text-center text-xs text-gray-400">El pago se realizará mediante transferencia o link de pago.</div>
      `;
    }

    // Eventos dinámicos
    function attachEvents() {
      if (currentView === 'login') {
        document.getElementById('doLoginBtn')?.addEventListener('click', async () => {
          const correo = document.getElementById('loginEmail').value;
          const password = document.getElementById('loginPassword').value;
          try {
            const result = await apiRequest('login', { correo, password });
            if (result.success) {
              currentUserEmail = correo;
              currentView = 'plans';
              renderApp();
            } else {
              alert('Credenciales incorrectas o usuario no existe');
            }
          } catch (err) { alert('Error de conexión: ' + err.message); }
        });
        document.getElementById('goToRegister')?.addEventListener('click', () => { currentView = 'register'; renderApp(); });
      }
      else if (currentView === 'register') {
        document.getElementById('doRegisterBtn')?.addEventListener('click', async () => {
          const nombre = document.getElementById('regNombre').value;
          const ciudad = document.getElementById('regCiudad').value;
          const ruc = document.getElementById('regRuc').value;
          const direccion = document.getElementById('regDireccion').value;
          const telefono = document.getElementById('regTelefono').value;
          const correo = document.getElementById('regCorreo').value;
          const password = document.getElementById('regPassword').value;
          if (!correo || !password) { alert('Correo y contraseña obligatorios'); return; }
          try {
            const result = await apiRequest('register', { nombre, ciudad, ruc, direccion, telefono, correo, password });
            if (result.success) {
              currentUserEmail = correo;
              currentView = 'plans';
              renderApp();
            } else {
              alert('Error en registro: ' + result.error);
            }
          } catch (err) { alert('Error de conexión: ' + err.message); }
        });
        document.getElementById('goToLogin')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
      }
      else if (currentView === 'plans') {
        document.querySelectorAll('[data-plan]').forEach(el => {
          el.addEventListener('click', async () => {
            const plan = el.getAttribute('data-plan');
            let monto = 0, duracionDias = 0;
            switch(plan) {
              case 'gratis': monto = 0; duracionDias = 7; break;
              case 'mensual': monto = 20; duracionDias = 30; break;
              case 'semestral': monto = 110; duracionDias = 180; break;
              case 'anual': monto = 200; duracionDias = 365; break;
            }
            try {
              const result = await apiRequest('savePlan', { correo: currentUserEmail, plan, monto, duracionDias });
              if (result.success) {
                // Redirigir al dashboard (debes tener dashboard.html en la misma carpeta)
                window.location.href = 'dashboard.html?email=' + encodeURIComponent(currentUserEmail);
              } else {
                alert('Error al guardar el plan: ' + result.error);
              }
            } catch (err) { alert('Error de conexión: ' + err.message); }
          });
        });
      }
    }

    function renderApp() {
      let html = '';
      if (currentView === 'login') html = renderLogin();
      else if (currentView === 'register') html = renderRegister();
      else if (currentView === 'plans') html = renderPlans();
      document.getElementById('appContent').innerHTML = html;
      attachEvents();
    }

    renderApp();
  </script>
</body>
</html>
