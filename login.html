<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Óptico - Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #f8fafc 0%, #e0e7ff 100%); }
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 antialiased">

  <div class="max-w-md w-full bg-white rounded-3xl shadow-[0_20px_50px_rgba(0,63,135,0.08)] overflow-hidden border border-gray-100/80">
    
    <!-- Cabecera -->
    <div class="bg-gradient-to-br from-[#002d5e] via-[#003f87] to-[#0056b3] px-8 py-7 text-white relative overflow-hidden">
      <div class="flex items-center gap-3.5 relative z-10">
        <div class="bg-white/10 p-2 rounded-2xl backdrop-blur-md">
          <span class="material-symbols-outlined text-3xl text-blue-200">visibility</span>
        </div>
        <div>
          <span class="font-extrabold text-2xl tracking-tight">Control Óptico</span>
          <p class="text-xs text-blue-200/90 font-medium mt-0.5">Gestión profesional para ópticas</p>
        </div>
      </div>
      <p class="text-xs text-blue-100/80 mt-4 bg-black/10 px-3 py-1.5 rounded-lg inline-block">Accede o regístrate para administrar tu óptica</p>
    </div>

    <!-- Contenedor dinámico -->
    <div id="appContent" class="p-8"></div>
  </div>

  <script>
    // ========== CONFIGURACIÓN ==========
    const API_URL = 'https://script.google.com/macros/s/AKfycbyegoMXgGxVcwKDfVYZ8TNm3s8dwh3c1-YJelDQv8wfadPAdcvhjNn4rR-oYzgmymbOYg/exec'; // <- TU URL
    const SOPORTE_WHATSAPP = '593984016027';

    let currentView = 'login';
    let currentUserEmail = null;
    let currentUserName = '';
    let currentPlanStatus = null; // 'pendiente', 'activo', 'rechazado', null

    // ========== FUNCIÓN API ==========
    async function apiRequest(action, params = {}, disableBtn = null) {
      if (disableBtn) {
        disableBtn.disabled = true;
        disableBtn.classList.add('opacity-60', 'cursor-not-allowed');
      }
      try {
        const query = new URLSearchParams({ action, ...params }).toString();
        const url = `${API_URL}?${query}`;
        const response = await fetch(url, { method: 'GET', mode: 'cors' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (err) {
        throw new Error('No se pudo conectar con el servidor.');
      } finally {
        if (disableBtn) {
          disableBtn.disabled = false;
          disableBtn.classList.remove('opacity-60', 'cursor-not-allowed');
        }
      }
    }

    // ========== VISTAS ==========
    function renderLogin() {
      return `
        <div>
          <h2 class="text-2xl font-bold text-gray-800">🔐 Iniciar sesión</h2>
          <p class="text-gray-400 text-sm mt-1 mb-6">Ingresa tu correo y contraseña</p>
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Correo electrónico</label>
              <input type="email" id="loginEmail" class="w-full border border-gray-200 bg-gray-50/50 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Contraseña</label>
              <input type="password" id="loginPassword" class="w-full border border-gray-200 bg-gray-50/50 rounded-xl px-4 py-3 text-sm focus:border-[#003f87] focus:ring-4 focus:ring-blue-100 outline-none">
            </div>
            <button id="doLoginBtn" class="w-full bg-[#003f87] hover:bg-[#002d5e] text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2">
              <span class="material-symbols-outlined text-lg">login</span> Ingresar
            </button>
            <div class="border-t border-gray-100 my-6 pt-4 text-center">
              <p class="text-sm text-gray-500">¿No tienes cuenta? <button id="goToRegister" class="text-[#003f87] font-bold hover:underline ml-1">Regístrate aquí</button></p>
            </div>
          </div>
        </div>
      `;
    }

    function renderRegister() {
      return `
        <div>
          <h2 class="text-2xl font-bold text-gray-800">📝 Registro de óptica</h2>
          <p class="text-gray-400 text-sm mt-1 mb-4">Completa los datos para dar de alta tu sucursal</p>
          <div class="space-y-3.5 max-h-[420px] overflow-y-auto pr-1 custom-scroll">
            <input id="regOptica" class="w-full border border-gray-200 bg-gray-50/50 rounded-xl px-4 py-2.5 text-sm" placeholder="Nombre de la Óptica">
            <input id="regDoctor" class="w-full border border-gray-200 bg-gray-50/50 rounded-xl px-4 py-2.5 text-sm" placeholder="Nombre del Doctor / Especialista">
            <div class="grid grid-cols-2 gap-3">
              <input id="regCiudad" class="w-full border border-gray-200 bg-gray-50/50 rounded-xl px-4 py-2.5 text-sm" placeholder="Ciudad">
              <input id="regRuc" class="w-full border border-gray-200 bg-gray-50/50 rounded-xl px-4 py-2.5 text-sm" placeholder="RUC / ID">
            </div>
            <input id="regDireccion" class="w-full border border-gray-200 bg-gray-50/50 rounded-xl px-4 py-2.5 text-sm" placeholder="Dirección">
            <input id="regTelefono" class="w-full border border-gray-200 bg-gray-50/50 rounded-xl px-4 py-2.5 text-sm" placeholder="Teléfono / WhatsApp">
            <input type="email" id="regCorreo" class="w-full border border-gray-200 bg-gray-50/50 rounded-xl px-4 py-2.5 text-sm" placeholder="Correo electrónico">
            <input type="password" id="regPassword" class="w-full border border-gray-200 bg-gray-50/50 rounded-xl px-4 py-2.5 text-sm" placeholder="Contraseña (mínimo 6 caracteres)">
          </div>
          <div class="mt-5 space-y-4">
            <button id="doRegisterBtn" class="w-full bg-[#003f87] hover:bg-[#002d5e] text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2">
              <span class="material-symbols-outlined text-lg">how_to_reg</span> Finalizar Registro
            </button>
            <p class="text-center text-sm text-gray-500">¿Ya tienes cuenta? <button id="goToLogin" class="text-[#003f87] font-bold hover:underline ml-1">Inicia sesión</button></p>
          </div>
        </div>
      `;
    }

    function renderPlans() {
      return `
        <div>
          <h2 class="text-2xl font-bold text-gray-800">💎 Elige tu plan</h2>
          <p class="text-sm text-gray-400 mt-1 mb-5">Selecciona la suscripción ideal para tu óptica</p>
          <div id="planContainer" class="space-y-3">
            <div data-plan="gratis" class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center cursor-pointer hover:bg-blue-50/30">
              <div><span class="font-bold">Plan Gratis</span><div class="text-xs text-gray-400">7 días de prueba</div></div>
              <span class="text-emerald-600 font-extrabold">Gratis</span>
            </div>
            <div data-plan="mensual" class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center cursor-pointer hover:bg-blue-50/30">
              <div><span class="font-bold">Plan Mensual</span><div class="text-xs text-gray-400">Facturación mes a mes</div></div>
              <span class="text-[#003f87] font-extrabold">$20</span>
            </div>
            <div data-plan="semestral" class="border-2 border-gray-100 rounded-2xl p-4 flex justify-between items-center cursor-pointer hover:bg-blue-50/30">
              <div><span class="font-bold">Plan Semestral</span><div class="text-xs text-blue-600">Ahorra $10</div></div>
              <span class="text-[#003f87] font-extrabold">$110</span>
            </div>
            <div data-plan="anual" class="border-2 border-blue-500/30 bg-blue-50/10 rounded-2xl p-4 flex justify-between items-center cursor-pointer relative">
              <div class="absolute -top-2.5 right-4 bg-orange-500 text-white text-[10px] font-extrabold px-2 py-0.5 rounded-full">Mejor Valor</div>
              <div><span class="font-bold">Plan Anual</span><div class="text-xs text-emerald-600">Ahorra $40 🔥</div></div>
              <span class="text-[#003f87] font-extrabold">$200</span>
            </div>
          </div>
          <div id="mensajePlan" class="mt-5 p-4 rounded-xl text-center text-sm hidden bg-gray-50"></div>
          <button id="volverLoginDesdePlan" class="mt-4 text-sm text-gray-500 hover:underline mx-auto block">← Volver al inicio de sesión</button>
        </div>
      `;
    }

    function renderPending() {
      return `
        <div class="text-center">
          <span class="material-symbols-outlined text-5xl text-amber-500 mb-3">hourglass_empty</span>
          <h2 class="text-xl font-bold text-gray-800">Solicitud de plan enviada</h2>
          <p class="text-gray-500 mt-2">Tu plan está <strong>pendiente de aprobación</strong>. Te contactaremos pronto.</p>
          <button id="volverLoginPendiente" class="mt-6 bg-[#003f87] text-white px-6 py-2 rounded-xl hover:bg-[#002d5e]">Ir al inicio de sesión</button>
        </div>
      `;
    }

    function renderRejected() {
      return `
        <div class="text-center">
          <span class="material-symbols-outlined text-5xl text-red-500 mb-3">cancel</span>
          <h2 class="text-xl font-bold text-gray-800">Plan rechazado</h2>
          <p class="text-gray-500 mt-2">Contacta con soporte para más información.</p>
          <button id="contactarSoporte" class="mt-6 bg-green-600 text-white px-6 py-2 rounded-xl">WhatsApp</button>
          <button id="volverLoginRechazado" class="mt-3 text-sm text-gray-500 underline block mx-auto">Volver al login</button>
        </div>
      `;
    }

    // ========== EVENTOS Y LÓGICA PRINCIPAL ==========
    async function handleLogin(correo, password, btn) {
      const result = await apiRequest('login', { correo, password }, btn);
      if (!result.success) {
        alert('⚠️ ' + (result.error || 'Credenciales incorrectas'));
        return false;
      }
      if (result.rol === 'admin') {
        window.location.href = 'admin_panel.html';
        return false;
      }
      // Usuario normal
      currentUserEmail = correo;
      currentUserName = result.doctor || 'Especialista';
      const planSeleccionado = result.planSeleccionado || false;
      const estadoPlan = result.estadoPlan || null;

      if (!planSeleccionado) {
        currentView = 'plans';
        renderApp();
      } else if (estadoPlan === 'pendiente_aprobacion') {
        currentView = 'pending';
        renderApp();
      } else if (estadoPlan === 'activo') {
        alert('✅ Plan activo. Redirigiendo al panel principal...');
        // window.location.href = 'dashboard.html';
        currentView = 'login'; // temporal, reemplazar con dashboard
        renderApp();
      } else if (estadoPlan === 'rechazado') {
        currentView = 'rejected';
        renderApp();
      } else {
        currentView = 'plans';
        renderApp();
      }
      return true;
    }

    function attachEvents() {
      if (currentView === 'login') {
        const btn = document.getElementById('doLoginBtn');
        btn?.addEventListener('click', async () => {
          const correo = document.getElementById('loginEmail').value.trim();
          const pwd = document.getElementById('loginPassword').value;
          if (!correo || !pwd) { alert('❌ Ingresa correo y contraseña'); return; }
          await handleLogin(correo, pwd, btn);
        });
        document.getElementById('goToRegister')?.addEventListener('click', () => { currentView = 'register'; renderApp(); });
      }
      else if (currentView === 'register') {
        const btn = document.getElementById('doRegisterBtn');
        btn?.addEventListener('click', async () => {
          const nombre = document.getElementById('regOptica').value.trim();
          const doctor = document.getElementById('regDoctor').value.trim();
          const ciudad = document.getElementById('regCiudad').value.trim();
          const ruc = document.getElementById('regRuc').value.trim();
          const direccion = document.getElementById('regDireccion').value.trim();
          const telefono = document.getElementById('regTelefono').value.trim();
          const correo = document.getElementById('regCorreo').value.trim();
          const password = document.getElementById('regPassword').value;
          if (!nombre || !doctor || !ciudad || !correo || !password) {
            alert('❌ Completa los campos obligatorios'); return;
          }
          const result = await apiRequest('register', { nombre, doctor, ciudad, ruc, direccion, telefono, correo, password }, btn);
          if (result.success) {
            alert('✅ Registro exitoso. Ahora inicia sesión.');
            currentView = 'login';
            renderApp();
          } else {
            alert('❌ Error: ' + (result.error || 'No se pudo registrar'));
          }
        });
        document.getElementById('goToLogin')?.addEventListener('click', () => { currentView = 'login'; renderApp(); });
      }
      else if (currentView === 'plans') {
        const cards = document.querySelectorAll('[data-plan]');
        const msgDiv = document.getElementById('mensajePlan');
        let enviado = false;

        document.getElementById('volverLoginDesdePlan')?.addEventListener('click', () => {
          currentView = 'login';
          renderApp();
        });

        cards.forEach(card => {
          card.addEventListener('click', async () => {
            if (enviado) { alert('Ya enviaste una solicitud. Espera aprobación.'); return; }
            const plan = card.getAttribute('data-plan');
            let monto = 0, dias = 0;
            if (plan === 'gratis') { monto = 0; dias = 7; }
            else if (plan === 'mensual') { monto = 20; dias = 30; }
            else if (plan === 'semestral') { monto = 110; dias = 180; }
            else if (plan === 'anual') { monto = 200; dias = 365; }

            if (!currentUserEmail) { alert('Error: usuario no identificado'); return; }

            // Bloquear UI
            cards.forEach(c => c.style.pointerEvents = 'none');
            msgDiv.classList.remove('hidden');
            msgDiv.innerHTML = '<span class="text-blue-600">Enviando solicitud...</span>';

            const result = await apiRequest('savePlan', { correo: currentUserEmail, plan, monto, duracionDias: dias });
            if (result.success) {
              enviado = true;
              msgDiv.innerHTML = '<span class="text-green-600">✅ ¡Solicitud enviada! Abriendo WhatsApp...</span>';
              const texto = `¡Hola! He seleccionado el plan ${plan.toUpperCase()} ($${monto})\nDoctor: ${currentUserName}\nCorreo: ${currentUserEmail}`;
              window.open(`https://wa.me/${SOPORTE_WHATSAPP}?text=${encodeURIComponent(texto)}`, '_blank');
              setTimeout(() => {
                currentView = 'login';
                renderApp();
              }, 3000);
            } else {
              alert('Error al guardar el plan: ' + (result.error || 'Intenta de nuevo'));
              cards.forEach(c => c.style.pointerEvents = 'auto');
              msgDiv.classList.add('hidden');
            }
          });
        });
      }
      else if (currentView === 'pending') {
        document.getElementById('volverLoginPendiente')?.addEventListener('click', () => {
          currentView = 'login';
          renderApp();
        });
      }
      else if (currentView === 'rejected') {
        document.getElementById('contactarSoporte')?.addEventListener('click', () => {
          window.open(`https://wa.me/${SOPORTE_WHATSAPP}?text=Hola%2C%20mi%20plan%20fue%20rechazado`, '_blank');
        });
        document.getElementById('volverLoginRechazado')?.addEventListener('click', () => {
          currentView = 'login';
          renderApp();
        });
      }
    }

    function renderApp() {
      let html = '';
      if (currentView === 'login') html = renderLogin();
      else if (currentView === 'register') html = renderRegister();
      else if (currentView === 'plans') html = renderPlans();
      else if (currentView === 'pending') html = renderPending();
      else if (currentView === 'rejected') html = renderRejected();
      document.getElementById('appContent').innerHTML = html;
      attachEvents();
    }
    renderApp();
  </script>
</body>
</html>
