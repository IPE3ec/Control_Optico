<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Control Óptico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f0f4ff; }
    .card-hover:hover { transform: translateY(-2px); transition: all 0.2s; }
  </style>
</head>
<body class="p-6">
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow">
      <div class="flex items-center gap-3"><span class="material-symbols-outlined text-3xl text-primary">admin_panel_settings</span><h1 class="text-2xl font-bold">Panel de Control Maestro</h1></div>
      <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-xl flex items-center gap-2">Cerrar sesión</button>
    </div>

    <!-- Estado global -->
    <div class="bg-white rounded-2xl shadow p-5 mb-6">
      <h2 class="font-bold text-xl mb-3">🔒 Control global de acceso</h2>
      <div class="flex flex-wrap gap-4 items-center">
        <span class="text-gray-600">Estado actual:</span>
        <span id="globalStatusBadge" class="px-4 py-1.5 rounded-full text-sm font-bold">--</span>
        <button id="btnActivarGlobal" class="bg-green-600 text-white px-4 py-2 rounded-lg">Activar sistema</button>
        <button id="btnBloquearGlobal" class="bg-red-600 text-white px-4 py-2 rounded-lg">Bloquear sistema</button>
      </div>
    </div>

    <!-- Solicitudes pendientes de aprobación -->
    <div class="bg-white rounded-2xl shadow p-5 mb-6">
      <h2 class="font-bold text-xl mb-3">⏳ Solicitudes de planes pendientes</h2>
      <div id="pendingRequestsList" class="space-y-3">Cargando...</div>
    </div>

    <!-- Usuarios activos (con fecha de vencimiento) -->
    <div class="bg-white rounded-2xl shadow p-5 mb-6">
      <h2 class="font-bold text-xl mb-3">✅ Usuarios con plan activo</h2>
      <div id="activeUsersList" class="overflow-x-auto">Cargando...</div>
    </div>

    <!-- Sedes (igual que antes) -->
    <div class="bg-white rounded-2xl shadow p-5">
      <div class="flex justify-between items-center mb-4"><h2 class="font-bold text-xl">🏢 Sucursales</h2><button id="newSedeBtn" class="bg-primary text-white px-3 py-1.5 rounded-lg text-sm">+ Nueva sede</button></div>
      <div id="sedesTable" class="overflow-x-auto">Cargando...</div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbydrkD4E9bRcFZap1uHa_fPBcy-9Y6d3Wlh_MD7UduTX8T3S-U0wvqj1lEvHB4LzZ7qDw/exec'; // REEMPLAZA

    if (!sessionStorage.getItem('adminLogged')) window.location.href = 'login.html';

    async function apiRequest(action, params = {}) {
      const query = new URLSearchParams({ action, ...params }).toString();
      const res = await fetch(`${API_URL}?${query}`, { method: 'GET', mode: 'cors' });
      if (!res.ok) throw new Error('Error');
      return await res.json();
    }

    async function loadPending() {
      const res = await apiRequest('getPendingRequests');
      const container = document.getElementById('pendingRequestsList');
      if (!res.success || res.pendientes.length === 0) { container.innerHTML = '<p class="text-gray-500">No hay solicitudes pendientes.</p>'; return; }
      container.innerHTML = res.pendientes.map(p => `
        <div class="border rounded-xl p-4 flex flex-wrap justify-between items-center gap-3">
          <div><strong>${escapeHtml(p.nombre)}</strong><br><span class="text-sm text-gray-500">${p.correo}</span><br>Plan: ${p.plan} - $${p.monto}</div>
          <div class="flex gap-2">
            <button class="approve-btn bg-green-600 text-white px-4 py-1.5 rounded-lg" data-correo="${p.correo}" data-accion="aprobar">Aprobar</button>
            <button class="reject-btn bg-red-600 text-white px-4 py-1.5 rounded-lg" data-correo="${p.correo}" data-accion="rechazar">Rechazar</button>
          </div>
        </div>
      `).join('');
      document.querySelectorAll('.approve-btn, .reject-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const correo = btn.dataset.correo;
          const accion = btn.classList.contains('approve-btn') ? 'aprobar' : 'rechazar';
          const result = await apiRequest('approvePlan', { correo, accion });
          alert(result.mensaje || (result.success ? 'Hecho' : 'Error'));
          loadPending();
          loadActiveUsers();
        });
      });
    }

    async function loadActiveUsers() {
      const res = await apiRequest('getUsersList');
      const active = res.users.filter(u => u.estado === 'activo');
      const container = document.getElementById('activeUsersList');
      if (active.length === 0) { container.innerHTML = '<p class="text-gray-500">No hay usuarios activos.</p>'; return; }
      container.innerHTML = `
        <table class="min-w-full border">
          <thead class="bg-gray-100"><tr><th class="p-2">Nombre</th><th>Plan</th><th>Vence</th><th>Estado</th></tr></thead>
          <tbody>${active.map(u => `<tr><td class="p-2">${escapeHtml(u.nombre)}</td><td>${u.plan}</td><td>${new Date(u.fecha_fin).toLocaleDateString()}</td><td><span class="px-2 py-1 bg-green-100 rounded-full text-xs">Activo</span></td></tr>`).join('')}</tbody>
        </table>
      `;
    }

    async function loadSedes() {
      const res = await apiRequest('getSedes');
      const container = document.getElementById('sedesTable');
      if (!res.success) { container.innerHTML = '<p>Error cargando sedes</p>'; return; }
      container.innerHTML = `
        <table class="min-w-full border">
          <thead><tr><th>Nombre</th><th>Administrador</th><th>Dirección</th><th>Acceso</th><th></th></tr></thead>
          <tbody>${res.sedes.map(s => `
            <tr><td class="p-2">${escapeHtml(s.nombre)}</td><td>${escapeHtml(s.administrador)}</td><td>${escapeHtml(s.direccion)}</td>
            <td><button class="toggle-access px-3 py-1 rounded-lg text-sm ${s.acceso === 'autorizado' ? 'bg-green-500' : 'bg-gray-400'}" data-id="${s.id}" data-acceso="${s.acceso}">${s.acceso === 'autorizado' ? 'Autorizado' : 'Pendiente'}</button></td>
            <td><button class="key-btn text-blue-600" data-id="${s.id}" data-nombre="${s.nombre}">🔑 Llave</button></td></tr>
          `).join('')}</tbody>
        </table>
      `;
      document.querySelectorAll('.toggle-access').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const nuevo = btn.dataset.acceso === 'autorizado' ? 'pendiente' : 'autorizado';
          await apiRequest('updateSedeAccess', { id, acceso: nuevo });
          loadSedes();
        });
      });
      document.querySelectorAll('.key-btn').forEach(btn => {
        btn.addEventListener('click', () => alert(`🔑 Llave para ${btn.dataset.nombre}: GM-${btn.dataset.id}-${Math.random().toString(36).substr(2,6)}`));
      });
    }

    async function loadGlobalStatus() {
      const res = await apiRequest('getSystemStatus');
      const badge = document.getElementById('globalStatusBadge');
      if (res.activo) { badge.innerText = 'ACTIVO'; badge.className = 'px-4 py-1.5 rounded-full bg-green-100 text-green-800 font-bold'; }
      else { badge.innerText = 'BLOQUEADO'; badge.className = 'px-4 py-1.5 rounded-full bg-red-100 text-red-800 font-bold'; }
    }

    async function setGlobalStatus(status) { await apiRequest('setSystemStatus', { status }); loadGlobalStatus(); }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

    document.getElementById('btnActivarGlobal').onclick = () => setGlobalStatus('ACTIVO');
    document.getElementById('btnBloquearGlobal').onclick = () => setGlobalStatus('BLOQUEADO');
    document.getElementById('logoutBtn').onclick = () => { sessionStorage.removeItem('adminLogged'); window.location.href = 'login.html'; };
    document.getElementById('newSedeBtn').onclick = async () => {
      const nombre = prompt('Nombre de la sede'); if(!nombre) return;
      const admin = prompt('Administrador'); if(!admin) return;
      const direccion = prompt('Dirección');
      const telefono = prompt('Teléfono');
      await apiRequest('createSede', { nombre, administrador: admin, direccion, telefono });
      loadSedes();
    };

    loadPending();
    loadActiveUsers();
    loadSedes();
    loadGlobalStatus();
  </script>
</body>
</html>
